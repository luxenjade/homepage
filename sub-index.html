<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shoei451</title>
    <link rel="icon" href="/images/favicon.ico" />
    <meta
      name="description"
      content="世界史・政経・地理・古典など、普段の学習や大学入試対策に役立つオンラインクイズ・年表などの学習ツールを提供しています。"
    />
    <link rel="canonical" href="https://shoei451.netlify.app/" />
    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Shoei451 — 高校生・大学受験生向けの学習・入試対策ツール"
    />
    <meta
      property="og:description"
      content="世界史・政経・地理・古典など、普段の学習や大学入試対策に役立つオンラインクイズ・年表などの学習ツールを提供しています。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shoei451.netlify.app/" />
    <meta
      property="og:image"
      content="https://shoei451.netlify.app/images/favicon.png"
    />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="Shoei451 — 高校生・大学受験生向けの学習・入試対策ツール"
    />
    <meta
      name="twitter:description"
      content="世界史・政経・地理・古典など、普段の学習や大学入試対策に役立つオンラインクイズ・年表などの学習ツールを提供しています。"
    />
    <meta
      name="twitter:image"
      content="https://shoei451.netlify.app/images/favicon.png"
    />
    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Shoei451",
        "url": "https://shoei451.netlify.app/"
      }
    </script>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#faba40" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Shoei451" />
    <link rel="apple-touch-icon" href="/images/favicon.png" />

    <!-- フラッシュ防止 -->
    <script>
      (function () {
        const t = localStorage.getItem("pref-theme");
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/utils.css" />
    <style>
      html.dark body {
        background-color: var(--color-bg);
        color: var(--color-text-primary);
      }
    </style>
  </head>
  <body>
    <div id="nav-container"></div>

    <!-- sub-index-init.js はここだけを書き換える -->
    <main id="page-content" class="container py-4">
      <p class="text-secondary">読み込み中...</p>
    </main>

    <footer id="site-footer"></footer>

    <script src="/js/icons.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/theme-toggle.js"></script>
    <script src="/js/sub-index-init.js"></script>

    <script>
      if (document.documentElement.classList.contains("dark")) {
        document.body.classList.add("dark");
      }
    </script>
  </body>
</html>
