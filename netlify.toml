[build]
publish = "dist"
command = "pnpm run build"

[[edge_functions]]
  path = "/api/posts"
  function = "posts"

[[edge_functions]]
  path = "/api/post"
  function = "post"

[[edge_functions]]
  path = "/api/protected-posts"
  function = "protected-posts"

[[edge_functions]]
  path = "/api/protected-post"
  function = "protected-post"

[[edge_functions]]
  path = "/api/sw"
  function = "sw"

[[edge_functions]]
  path = "/api/admin/posts"
  function = "admin-posts"

[[edge_functions]]
  path = "/api/admin/post"
  function = "admin-post"


[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data:;"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[plugins]]
package = "netlify-plugin-cloudinary"
  [plugins.inputs]
  cloudName = "dv2sf0nxh"
  # 指定した拡張子をCloudinaryの置換対象から外す
  ignoreImages = ["*.svg"]

# Category redirects are generated into dist/_redirects by scripts/build.js.
