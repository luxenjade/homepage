[build]
publish = "dist"
command = "pnpm run build"

[[edge_functions]]
  path = "/api/sw"
  function = "sw"


[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

# Category redirects are generated into dist/_redirects by scripts/build.js.
