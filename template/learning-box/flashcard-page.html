<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{TITLE}} | learning box</title>
    <meta name="description" content="{{DESCRIPTION}}" />
    <link rel="icon" href="/images/favicon.ico" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#faba40" />

    <!-- フラッシュ防止：テーマをCSSより前に適用 -->
    <script>
      (function () {
        const t = localStorage.getItem("pref-theme");
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/utils.css" />
    {{SUBJECT_STYLE}}
    <link rel="stylesheet" href="../css/subject-colors.css" />
    <link rel="stylesheet" href="../css/flashcard-style.css" />
    <style>
      html.dark body {
        background-color: var(--color-bg);
        color: var(--color-text-primary);
      }
      /* Individual page header adjustment */
      .app-header {
        background: var(--color-bg);
        border-bottom: 1px solid var(--color-border);
        padding: 0.75rem 0;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .app-header__inner {
        max-width: var(--container-max);
        margin: 0 auto;
        padding: 0 var(--container-pad);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .app-header__left {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .app-header__title-group {
        display: flex;
        flex-direction: column;
        line-height: 1.2;
      }
      .app-header__title {
        font-size: 0.95rem;
        font-weight: 700;
      }
      .app-header__subject {
        font-size: 0.75rem;
        color: var(--color-text-secondary);
      }
    </style>
  </head>
  <body data-subject="{{SUBJECT}}">
    <header class="app-header">
      <div class="app-header__inner">
        <div class="app-header__left">
          <a href="../index.html" class="back-link">
            <i class="bi bi-chevron-left"></i> Back
          </a>
          <div class="app-header__title-group">
            <span class="app-header__title">{{TITLE}}</span>
            <span class="app-header__subject">{{SUBJECT}}</span>
          </div>
        </div>
        <div class="app-header__right">
          <div class="logo-switches">
            <button id="theme-toggle" title="Toggle Theme">
              <svg id="moon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
              <svg id="sun" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="start-overlay" id="startOverlay">
      <div class="start-hero">
        <p class="start-hero__label" id="startLabel">
          {{SUBJECT}} · Flashcards
        </p>
        <h1 class="start-hero__title" id="startTitle">{{TITLE}}</h1>
        <div class="start-hero__divider"></div>
      </div>
      <div class="start-card">
        <h2 class="start-card__title">学習スタート</h2>
        <p class="start-card__desc">カテゴリと問題数を選んでください</p>
        <div class="start-block">
          <span class="start-label">カテゴリ</span>
          <div class="start-cats" id="startCats"></div>
        </div>
        <div class="start-block">
          <span class="start-label">問題数</span>
          <select id="startCount" class="start-count">
            <option value="10">10問</option>
            <option value="20" selected>20問</option>
            <option value="30">30問</option>
            <option value="all">全問</option>
          </select>
        </div>
        <p class="start-meta" id="startMeta"></p>
        <button class="btn-primary start-btn" onclick="startStudy()">
          Tap to Start
        </button>
      </div>
    </div>

    <div class="mode-panel" id="mode-study">
      <div class="study-area">
        <div class="progress-strip">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="deck-nav-row">
          <button class="nav-btn" id="prevBtn" onclick="prevCard()" disabled>
            &#x2039;
          </button>
          <div class="deck-center">
            <span class="deck-indicator" id="deckIndicator">1 / --</span>
            <div class="mastery-dots" id="masteryDots"></div>
          </div>
          <button class="nav-btn" id="nextBtn" onclick="nextCard()">
            &#x203A;
          </button>
        </div>
        <div class="card-scene" id="cardScene" onclick="flipCard()">
          <div class="card-body" id="cardBody">
            <div class="card-face card-front">
              <div class="card-face-inner">
                <div class="face-top">
                  <span class="face-badge" id="frontBadge"></span>
                  <span class="face-hint"
                    >Tap / <kbd>Space</kbd> to reveal answer</span
                  >
                </div>
                <p class="card-question" id="cardQuestion"></p>
                <span class="card-watermark">Question</span>
              </div>
            </div>
            <div class="card-face card-back" id="cardBack">
              <div class="card-face-inner">
                <div class="face-top">
                  <span class="face-badge back-badge" id="backBadge"></span>
                </div>
                <p class="card-answer" id="cardAnswer"></p>
                <p class="card-sub" id="cardSub"></p>
                <img
                  id="cardImg"
                  class="card-img"
                  src=""
                  alt=""
                  style="display: none"
                />
                <span class="card-watermark back-wm">Answer</span>
              </div>
            </div>
          </div>
        </div>
        <div class="mastery-row">
          <button class="mastery-btn m-forgot" onclick="markCard('forgot')">
            <span class="m-icon">✗</span><span class="m-label">わからない</span>
          </button>
          <button class="mastery-btn m-unsure" onclick="markCard('unsure')">
            <span class="m-icon">△</span><span class="m-label">あやふや</span>
          </button>
          <button class="mastery-btn m-knew" onclick="markCard('knew')">
            <span class="m-icon">✓</span><span class="m-label">わかった</span>
          </button>
        </div>
        <p class="kb-hint">
          <kbd>←</kbd><kbd>→</kbd> 移動 &nbsp;|&nbsp; <kbd>Space</kbd> 裏返す
          &nbsp;|&nbsp; <kbd>1</kbd>✗ <kbd>2</kbd>△ <kbd>3</kbd>✓
        </p>
      </div>
    </div>

    <div class="complete-overlay" id="completeOverlay" style="display: none">
      <div class="complete-card">
        <div class="complete-icon">◐</div>
        <h2 class="complete-title">一周完了</h2>
        <div class="complete-stats" id="completeStats"></div>
        <div class="complete-breakdown" id="completeBreakdown"></div>
        <div class="complete-actions">
          <button class="btn-secondary" onclick="reviewWeak()">
            ✗ △ のみ復習
          </button>
          <button class="btn-secondary" onclick="openStartScreen()">
            設定に戻る
          </button>
          <button class="btn-primary" onclick="restartDeck()">もう一度</button>
        </div>
      </div>
    </div>

    <div class="list-toggle" onclick="toggleList()">
      <span>一覧</span>
      <span id="listArrow">›</span>
    </div>
    <div class="list-panel" id="listPanel">
      <div class="list-head">
        <span>カード一覧</span>
        <button class="list-close" onclick="toggleList()">閉じる</button>
      </div>
      <div class="list-body" id="listBody"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/js/icons.js"></script>
    <script src="/js/theme-toggle.js"></script>
    <script>
      if (document.documentElement.classList.contains("dark")) {
        document.body.classList.add("dark");
      }
    </script>
    <script>{{DECK_SCRIPT}}</script>
    <script src="../js/flashcard-app.js"></script>
  </body>
</html>
