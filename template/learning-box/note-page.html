<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{TITLE}} — learning box</title>
    <meta name="description" content="{{DESCRIPTION}}" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    {{SUBJECT_STYLE}}
    <link rel="stylesheet" href="../css/subject-colors.css" />
    <link rel="stylesheet" href="../css/note-style.css" />
  </head>
  <body data-subject="{{SUBJECT}}">
    <header class="site-header">
      <div class="header-inner">
        <div class="header-left">
          <a href="../index.html" class="header-back">Back to Home</a>
          <span class="header-title header-title--desktop" id="headerTitle"
            >{{TITLE}}</span
          >
          <span class="header-sub" id="headerSub">{{SUBJECT}}</span>
        </div>
        <div class="header-right">
          <button
            class="tab-btn active"
            id="tabSummary"
            onclick="switchTab('summary')"
          >
            まとめ
          </button>
          <button class="tab-btn" id="tabQuiz" onclick="switchTab('quiz')">
            穴埋め
          </button>
        </div>
      </div>
    </header>

    <nav class="unit-nav" id="unitNav">{{NAV_BUTTONS}}</nav>

    <main class="main" id="main">
      {{UNIT_PANELS}}
      <div id="quizChrome" style="display: none">
        <div class="quiz-header-row">
          <div class="quiz-score-display">
            <strong id="quizScoreBig">— / —</strong>
            <span>表示済み</span>
          </div>
        </div>
        <div class="quiz-progress-bar">
          <div class="quiz-progress-fill" id="quizProgressFill"></div>
        </div>
        <div class="quiz-controls">
          <button class="btn-primary" onclick="revealAll()">全て表示</button>
          <button class="btn-ghost" onclick="hideAll()">全て隠す</button>
          <button class="btn-ghost" onclick="resetQuiz()">リセット</button>
        </div>
        <p class="quiz-kb-hint">語句をクリックして表示 / 再クリックで隠す</p>
      </div>
    </main>

    <div class="nav-overlay" id="navOverlay"></div>
    <button class="nav-toggle" id="navToggle" aria-label="ナビを開く">
      <span class="nav-toggle-icon">☰</span>
      <span>Units</span>
    </button>

    <div class="toast" id="toast"></div>

    <script type="application/json" id="noteUnitsData">
      {{UNITS_JSON}}
    </script>
    <script src="../js/note-static.js"></script>
  </body>
</html>
