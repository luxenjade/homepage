<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wh_dates 管理画面</title>
    <link rel="icon" href="/images/favicon.ico" />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/utils.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <!-- ==================== LOGIN ==================== -->
    <div id="login-screen">
      <div class="login-card">
        <h1>wh_dates 管理画面</h1>
        <p>Supabase アカウントでログイン</p>
        <div class="field">
          <label for="login-email">メールアドレス</label>
          <input
            type="text"
            id="login-email"
            placeholder="admin@example.com"
            autocomplete="email"
          />
        </div>
        <div class="field">
          <label for="login-pass">パスワード</label>
          <input
            type="text"
            id="login-pass"
            placeholder="••••••••"
            autocomplete="current-password"
            style="-webkit-text-security: disc"
          />
        </div>
        <div id="login-err" class="err-msg"></div>
        <button class="btn-primary" id="login-btn">ログイン</button>
      </div>
    </div>

    <!-- ==================== ADMIN ==================== -->
    <div id="admin-screen" class="hidden">
      <div class="admin-wrap">
        <div class="admin-header">
          <span class="admin-header__title">wh_dates 管理画面</span>
          <div class="admin-header__right">
            <span class="user-badge" id="user-email-badge"></span>
            <span id="theme-toggle-container"></span>
            <button class="btn-secondary" id="logout-btn">ログアウト</button>
          </div>
        </div>

        <div class="tabs">
          <button class="tab-btn active" data-tab="table-tab">年表編集</button>
          <button class="tab-btn" data-tab="memo-tab">メモ編集</button>
        </div>

        <!-- ===== TABLE TAB ===== -->
        <div id="table-tab" class="tab-panel active">
          <div class="toolbar">
            <input
              type="text"
              id="search-input"
              placeholder="イベント・説明で検索…"
            />
            <select id="filter-region">
              <option value="">地域：すべて</option>
            </select>
            <select id="filter-field">
              <option value="">分野：すべて</option>
              <option>政治</option>
              <option>経済</option>
              <option>文化・宗教</option>
              <option>社会</option>
              <option>外交・戦争</option>
            </select>
            <select id="filter-record">
              <option value="">種別：すべて</option>
              <option value="event">event</option>
              <option value="period">period</option>
              <option value="person">person</option>
            </select>
            <button class="btn-accent" id="new-row-btn">＋ 新規追加</button>
            <span class="count-badge" id="count-badge"></span>
          </div>

          <div class="table-wrap">
            <table>
              <colgroup>
                <col class="col-year" />
                <col class="col-type" />
                <col class="col-event" />
                <col class="col-field" />
                <col class="col-region" />
                <col class="col-score" />
                <col class="col-memo" />
              </colgroup>
              <thead>
                <tr>
                  <th data-col="year">
                    年 <span class="th-sort-icon" id="sort-year"></span>
                  </th>
                  <th data-col="record_type">
                    種別
                    <span class="th-sort-icon" id="sort-record_type"></span>
                  </th>
                  <th data-col="event">
                    イベント <span class="th-sort-icon" id="sort-event"></span>
                  </th>
                  <th data-col="field">
                    分野 <span class="th-sort-icon" id="sort-field"></span>
                  </th>
                  <th data-col="region">地域</th>
                  <th data-col="wiki_score" style="text-align: center">
                    重要度
                    <span class="th-sort-icon" id="sort-wiki_score"></span>
                  </th>
                  <th style="text-align: center">M</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <tr class="loading-row">
                  <td colspan="7"><span class="spinner"></span> 読み込み中…</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="pagination" id="pagination"></div>
        </div>

        <!-- ===== MEMO TAB ===== -->
        <div id="memo-tab" class="tab-panel">
          <div class="toolbar" style="margin-bottom: 1rem">
            <input
              type="text"
              id="memo-search"
              placeholder="メモありのイベントを検索…"
            />
            <span class="count-badge" id="memo-count-badge"></span>
          </div>
          <div class="memo-layout">
            <div>
              <div class="memo-list" id="memo-list">
                <div
                  style="
                    padding: 1rem;
                    text-align: center;
                    color: var(--color-text-secondary);
                    font-size: 0.875rem;
                  "
                >
                  <span class="spinner"></span>
                </div>
              </div>
            </div>
            <div class="memo-editor" id="memo-editor">
              <div class="memo-editor__header">メモ編集</div>
              <p
                style="font-size: 0.875rem; color: var(--color-text-secondary)"
              >
                左のリストから項目を選択してください。
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ==================== EDIT MODAL (Multi-step) ==================== -->
    <div class="modal-backdrop" id="edit-modal">
      <div class="modal">
        <div class="modal__header">
          <span class="modal__title" id="modal-title">レコード編集</span>
          <button class="modal__close" id="modal-close">✕</button>
        </div>

        <!-- Step indicator -->
        <div class="step-indicator" id="step-indicator">
          <!-- populated by JS -->
        </div>

        <form id="edit-form" autocomplete="off">
          <!-- ===== Step 1: 基本情報 ===== -->
          <div class="step-panel active" id="step-1">
            <div class="form-grid">
              <div class="span-2">
                <label class="field-label"
                  >イベント名 <span class="required">*</span></label
                >
                <input
                  type="text"
                  id="f-event"
                  placeholder="ローマ帝国の分裂"
                />
              </div>
              <div>
                <label class="field-label"
                  >年 <span class="required">*</span></label
                >
                <input type="number" id="f-year" placeholder="-221" />
                <div class="field-hint">負数＝紀元前</div>
              </div>
              <div>
                <label class="field-label">年（終了）</label>
                <input type="number" id="f-year-end" placeholder="任意" />
              </div>

              <div>
                <label class="field-label"
                  >date_type <span class="required">*</span></label
                >
                <select id="f-date-type">
                  <option value="year">year</option>
                  <option value="full">full</option>
                  <option value="circa">circa</option>
                </select>
              </div>
              <div>
                <label class="field-label"
                  >record_type <span class="required">*</span></label
                >
                <select id="f-record-type">
                  <option value="event">event</option>
                  <option value="period">period</option>
                  <option value="person">person</option>
                </select>
              </div>

              <div id="full-date-row" class="hidden">
                <label class="field-label">full_date</label>
                <input type="date" id="f-full-date" />
              </div>

              <div>
                <label class="field-label">分野 (field)</label>
                <select id="f-field">
                  <option value="">|</option>
                  <option>政治</option>
                  <option>経済</option>
                  <option>文化・宗教</option>
                  <option>社会</option>
                  <option>外交・戦争</option>
                </select>
              </div>

              <div class="span-2">
                <label class="field-label">説明 (description)</label>
                <textarea
                  id="f-description"
                  rows="2"
                  placeholder="補足説明…"
                ></textarea>
              </div>
            </div>
          </div>

          <!-- ===== Step 2: 地域 ===== -->
          <div class="step-panel" id="step-2">
            <label class="field-label">地域 (region) | 複数選択可</label>
            <div class="region-grid" id="region-grid">
              <!-- populated by JS after wh_regions load -->
              <div
                style="
                  color: var(--color-text-secondary);
                  font-size: 0.875rem;
                  grid-column: 1/-1;
                  padding: 0.5rem 0;
                "
              >
                <span class="spinner"></span> 読み込み中…
              </div>
            </div>
          </div>

          <!-- ===== Step 3: Wikipedia URL ===== -->
          <div class="step-panel" id="step-3">
            <div class="form-grid">
              <div class="span-2">
                <label class="field-label">wiki_url</label>
                <div class="wiki-row">
                  <input
                    type="text"
                    id="f-wiki-url"
                    placeholder="https://ja.wikipedia.org/wiki/…"
                  />
                  <button
                    type="button"
                    class="btn-ghost wiki-search-btn"
                    id="wiki-search-btn"
                  >
                    <svg
                      width="13"
                      height="13"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2.2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      aria-hidden="true"
                    >
                      <circle cx="11" cy="11" r="8" />
                      <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    自動検索
                  </button>
                </div>
                <div class="wiki-status" id="wiki-status"></div>
              </div>
            </div>

            <div
              id="modal-save-msg"
              class="save-msg"
              style="margin-top: 1rem"
            ></div>
          </div>
        </form>

        <div class="modal__footer">
          <button class="btn-danger" id="delete-btn">Delete</button>
          <div class="modal__footer-right">
            <button class="btn-secondary hidden" id="modal-cancel">
              cancel
            </button>
            <button class="btn-secondary hidden" id="step-back-btn">
              back
            </button>
            <button class="btn-accent" id="step-next-btn">Next</button>
            <button class="btn-accent hidden" id="save-btn">save</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ==================== DELETE CONFIRM MODAL ==================== -->
    <div class="modal-backdrop" id="confirm-modal">
      <div class="modal" style="max-width: 420px">
        <div class="modal__header">
          <span class="modal__title">削除の確認</span>
          <button class="modal__close" id="confirm-close">✕</button>
        </div>
        <p
          id="confirm-msg"
          style="
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            margin-bottom: 1.25rem;
          "
        ></p>
        <div class="modal__footer" style="padding-top: 0; border-top: none">
          <button class="btn-secondary" id="confirm-cancel">Cancel</button>
          <button class="btn-danger" id="confirm-ok">Delete</button>
        </div>
      </div>
    </div>

    <script src="/js/theme-toggle.js"></script>
    <script src="script.js"></script>
  </body>
</html>
