<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>世界史年表(legacy) — Shoei451</title>
    <link rel="icon" href="/images/wh-quiz.png" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/wh-utils.js"></script>
    <!-- 変更後: theme-wh.css を先に読み込む -->
    <link rel="stylesheet" href="/css/theme-toggle.css" />
    <style>
      /* ===================================================
   theme-wh.css
   世界史・政経タイムライン系ページの共通スタイル
   読み込むページ:
     history/worldhistory/timeline.html
     seikei/seikei-timeline.html
   =================================================== */

      /* ===== Variables ===== */
      :root {
        --accent-gold: #faba40;
        --accent-navy: #1a2b3c;
        --bg-light: #ffffff;
        --bg-light-secondary: #f5f5f5;
        --text-light: #1a2b3c;
        --text-light-secondary: #666666;
        --border-light: #e0e0e0;
        --shadow-light: rgba(26, 43, 60, 0.1);
      }

      body.dark {
        --bg-light: #1a2b3c;
        --bg-light-secondary: #243447;
        --text-light: #f5f5f5;
        --text-light-secondary: #b0b0b0;
        --border-light: #3a4a5c;
        --shadow-light: rgba(0, 0, 0, 0.3);
      }

      /* ===== Reset ===== */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* ===== Base ===== */
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue",
          Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        line-height: 1.6;
        background: var(--bg-light);
        color: var(--text-light);
        transition:
          background 0.3s,
          color 0.3s;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }

      /* ===== Header ===== */
      header {
        background: var(--bg-light-secondary);
        border-bottom: 2px solid var(--accent-gold);
        padding: 20px;
        margin-bottom: 30px;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 2px 10px var(--shadow-light);
      }

      .header-content {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
      }

      h1 {
        font-size: 1.8rem;
        color: var(--accent-navy);
        font-weight: 700;
      }

      body.dark h1 {
        color: var(--accent-gold);
      }

      /* ===== Controls ===== */
      .controls {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      button {
        background: var(--accent-gold);
        color: var(--accent-navy);
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: 600;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        font-size: 0.95rem;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 8px var(--shadow-light);
      }

      .search-box {
        padding: 10px 15px;
        border: 2px solid var(--border-light);
        border-radius: 5px;
        background: var(--bg-light);
        color: var(--text-light);
        font-size: 0.95rem;
        width: 250px;
        transition:
          border-color 0.3s,
          box-shadow 0.3s;
      }

      .search-box:focus {
        outline: none;
        border-color: var(--accent-gold);
        box-shadow: 0 0 0 3px rgba(250, 186, 64, 0.1);
      }

      /* ===== Tabs ===== */
      .tabs {
        display: flex;
        gap: 5px;
        margin-bottom: 20px;
        border-bottom: 2px solid var(--border-light);
        overflow-x: auto;
        padding-bottom: 5px;
      }

      .tab {
        padding: 12px 24px;
        background: transparent;
        border: none;
        border-bottom: 3px solid transparent;
        cursor: pointer;
        font-weight: 500;
        color: var(--text-light-secondary);
        transition:
          color 0.2s,
          background 0.2s;
        white-space: nowrap;
      }

      .tab:hover {
        color: var(--text-light);
        background: rgba(250, 186, 64, 0.1);
      }

      .tab.active {
        color: var(--accent-gold);
        border-bottom-color: var(--accent-gold);
        font-weight: 600;
      }

      /* ===== Timeline Table ===== */
      .timeline-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--bg-light-secondary);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 4px 12px var(--shadow-light);
      }

      .timeline-table thead {
        background: var(--accent-navy);
        color: white;
      }

      body.dark .timeline-table thead {
        background: var(--accent-gold);
        color: var(--accent-navy);
      }

      .timeline-table th {
        padding: 15px;
        text-align: left;
        font-weight: 600;
        font-size: 0.95rem;
      }

      .timeline-table td {
        padding: 15px;
        border-bottom: 1px solid var(--border-light);
      }

      .timeline-table tbody tr {
        transition: background 0.2s;
      }

      .timeline-table tbody tr:hover {
        background: rgba(250, 186, 64, 0.1);
      }

      .event-title {
        font-weight: 500;
      }

      /* ===== Category Chip base ===== */
      .category-chip {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 0.85rem;
        font-weight: 600;
        white-space: nowrap;
      }

      /* ===== Modal ===== */
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }

      .modal.active {
        display: flex;
      }

      .modal-content {
        background: var(--bg-light);
        padding: 30px;
        border-radius: 10px;
        width: 90%;
        max-width: 600px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 10px 40px var(--shadow-light);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .modal-header h2 {
        font-size: 1.5rem;
        color: var(--accent-navy);
      }

      body.dark .modal-header h2 {
        color: var(--accent-gold);
      }

      .close-modal {
        background: transparent;
        color: var(--text-light);
        font-size: 1.5rem;
        padding: 0;
        width: 30px;
        height: 30px;
        border-radius: 50%;
      }

      /* ===== Form (modal内) ===== */
      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--text-light);
      }

      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 12px;
        border: 2px solid var(--border-light);
        border-radius: 5px;
        background: var(--bg-light-secondary);
        color: var(--text-light);
        font-size: 0.95rem;
        font-family: inherit;
        transition: border-color 0.2s;
      }

      .form-group input:focus,
      .form-group textarea:focus,
      .form-group select:focus {
        outline: none;
        border-color: var(--accent-gold);
      }

      .form-group textarea {
        resize: vertical;
        min-height: 100px;
      }

      .form-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 25px;
      }

      .btn-cancel {
        background: var(--bg-light-secondary);
        color: var(--text-light);
        border: 2px solid var(--border-light);
      }

      /* ===== Utilities ===== */
      .hidden {
        display: none;
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: var(--text-light-secondary);
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-light-secondary);
      }

      .empty-state svg {
        width: 80px;
        height: 80px;
        margin-bottom: 20px;
        opacity: 0.5;
      }

      /* ===== Print ===== */
      @media print {
        header,
        .controls,
        .event-actions,
        #theme-toggle {
          display: none !important;
        }

        body {
          background: white;
          color: black;
        }

        .timeline-table {
          box-shadow: none;
        }
      }

      /* ===================================================
   依存: ../../css/theme-wh.css
   =================================================== */

      /* ===== Event Date Cell ===== */
      .event-year {
        font-weight: 600;
        color: var(--accent-navy);
        white-space: nowrap;
        font-size: 1rem;
      }

      body.dark .event-year {
        color: var(--accent-gold);
      }

      /* ===== Wikipedia Link ===== */
      .event-link {
        color: var(--accent-gold);
        text-decoration: none;
        font-weight: 600;
      }

      .event-link:hover {
        text-decoration: underline;
      }

      /* ===== Stats Bar ===== */
      .stats {
        background: var(--bg-light-secondary);
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: flex;
        gap: 30px;
        flex-wrap: wrap;
        justify-content: center;
        box-shadow: 0 2px 8px var(--shadow-light);
      }

      .stat-item {
        text-align: center;
      }

      .stat-number {
        font-size: 2rem;
        font-weight: 700;
        color: var(--accent-gold);
      }

      .stat-label {
        font-size: 0.9rem;
        color: var(--text-light-secondary);
      }

      /* ===== Period Chips ===== */
      /* 各チップのライト/ダーク配色をひとまとめに */
      .period-chip.\~0 {
        background: #e3f2fd;
        color: #1565c0;

      body.dark .period-chip.\~0 {

      .period-chip.\31\~1000 {

      }
      body.dark .period-chip.\31001\~1500 {

      }

      .period-chip.\31501\~1700 {
        background: #e8f5e9;

      }
      body.dark .period-chip.\31501\~1700 {

      }

      .period-chip.\31701\~1800 {

      }

      .period-chip.\31801\~1900 {

      }

      .period-chip.\31901\~1945 {

      .period-chip.\31946\~1989 {

      body.dark .period-chip.\31946\~1989 {

      .period-chip.\31990\~ {

      /* ===== Responsive ===== */
      @media (max-width: 768px) {

  <body>
    <header>
      <div class="header-content">
        <h1>📜 世界史年表</h1>
        <div class="controls">
          <input
            type="text"
            id="searchBox"
            class="search-box"
            placeholder="イベントを検索..."
          />
          <span class="logo-switches" id="theme-toggle-container"></span>
        </div>
      </div>
    </header>

    <div class="container">
      <div class="stats" id="statsSection">
        <div class="stat-item">
          <div class="stat-number" id="totalEvents">-</div>
          <div class="stat-label">総イベント数</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="displayedEvents">-</div>
          <div class="stat-label">表示中</div>
        </div>
      </div>

      <div style="margin-bottom: 20px; text-align: center">
        <label style="font-weight: 600; margin-right: 10px">表示モード:</label>
        <select
          id="viewMode"
          style="
            padding: 8px 12px;
            border: 2px solid var(--border-light);
            border-radius: 5px;
            background: var(--bg-light);
            color: var(--text-light);
            font-size: 0.95rem;
          "
        >
          <option value="period">時代別</option>
          <option value="chapter">章別</option>
        </select>
      </div>

      <div class="tabs" id="categoryTabs"></div>

      <div id="timelineContainer">
        <div class="loading">読み込み中...</div>
      </div>
    </div>

    <script src="/js/theme-toggle.js"></script>
    <script type="module">
      import { db, tables } from "../../js/supabase_config.js";

      // State
      let allEvents = [];
      let currentCategory = "all";
      let currentViewMode = "period";
      let searchQuery = "";

      const periods = [
        { value: "~0", label: "紀元前" },
        { value: "1~1000", label: "1年~1000年" },
        { value: "1001~1500", label: "1001年~1500年" },
        { value: "1501~1700", label: "1501年~1700年" },
        { value: "1701~1800", label: "1701年~1800年" },
        { value: "1801~1900", label: "1801年~1900年" },
        { value: "1901~1945", label: "1901年~1945年" },
        { value: "1946~1989", label: "1946年~1989年" },
        { value: "1990~", label: "1990年~" },
      ];

      const chapters = [
        { value: "第1章", label: "古代文明圏" },
        { value: "第2章", label: "中世ヨーロッパ" },
        { value: "第3章", label: "近現代ヨーロッパ" },
        { value: "第4章", label: "東アジア（中国・モンゴル）" },
        { value: "第5章", label: "東アジア（日本・朝鮮）" },
        { value: "第6章", label: "イスラーム世界" },
        { value: "第7章", label: "南アジア・東南アジア" },
        { value: "第8章", label: "アメリカ大陸" },
        { value: "第9章", label: "第一次世界大戦" },
        { value: "第10章", label: "第二次世界大戦" },
        { value: "第11章", label: "戦後国際史" },
      ];

      document.addEventListener("DOMContentLoaded", function () {
        init();
      });

      async function init() {
        await loadEvents();
        setupEventListeners();
        renderTabs();
        renderTimeline();
      }

      async function loadEvents() {
        try {
          let allQuestions = [];
          let start = 0;
          const batchSize = 1000;

          while (true) {
            const { data, error } = await db
              .from(tables.WH_QUIZ)
              .select("*")
              .order("is_bc", { ascending: false })
              .order("year", { ascending: true })
              .range(start, start + batchSize - 1);

            if (error) throw error;
            if (!data || data.length === 0) break;

            allQuestions.push(...data);
            if (data.length < batchSize) break;
            start += batchSize;
          }

          allEvents = allQuestions;
          document.getElementById("totalEvents").textContent = allEvents.length;
        } catch (error) {
          console.error("Error loading events:", error);
          document.getElementById("timelineContainer").innerHTML = `
                    <div class="empty-state">
                        <p>⚠️ データの読み込みに失敗しました</p>
                    </div>
                `;
        }
      }

      function setupEventListeners() {
        document.getElementById("searchBox").addEventListener("input", (e) => {
          searchQuery = e.target.value;
          renderTimeline();
        });

        document.getElementById("viewMode").addEventListener("change", (e) => {
          currentViewMode = e.target.value;
          currentCategory = "all";
          renderTabs();
          renderTimeline();
        });
      }

      function renderTabs() {
        const container = document.getElementById("categoryTabs");
        const categories = currentViewMode === "period" ? periods : chapters;

        container.innerHTML = `
                <button class="tab active" data-category="all">すべて</button>
                ${categories
                  .map(
                    (cat) =>
                      `<button class="tab" data-category="${cat.value}">${cat.label}</button>`,
                  )
                  .join("")}
            `;

        container.querySelectorAll(".tab").forEach((tab) => {
          tab.addEventListener("click", (e) => {
            container
              .querySelectorAll(".tab")
              .forEach((t) => t.classList.remove("active"));
            e.target.classList.add("active");
            currentCategory = e.target.dataset.category;
            renderTimeline();
          });
        });
      }

      function renderTimeline() {
        const container = document.getElementById("timelineContainer");

        const filteredEvents = allEvents.filter((event) => {
          const matchesCategory =
            currentCategory === "all" ||
            (currentViewMode === "period"
              ? event.period === currentCategory
              : event.chapter === currentCategory);
          const matchesSearch =
            !searchQuery ||
            event.event.toLowerCase().includes(searchQuery.toLowerCase());
          return matchesCategory && matchesSearch;
        });

        document.getElementById("displayedEvents").textContent =
          filteredEvents.length;

        if (filteredEvents.length === 0) {
          container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <p>イベントがありません</p>
                    </div>
                `;
          return;
        }

        const tableHTML = `
                <table class="timeline-table">
                    <thead>
                        <tr>
                            <th style="width: 120px;">年代</th>
                            <th style="width: 40%;">出来事</th>
                            <th style="width: 15%;">${currentViewMode === "period" ? "章" : "時代"}</th>
                            <th>参考リンク</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filteredEvents
                          .map(
                            (event) => `
                            <tr>
                                <td class="event-year">${formatYear(event.is_bc ? -Math.abs(event.year) : event.year)}</td>
                                <td class="event-title">${escapeHtml(event.event)}</td>
                                <td>
                                    ${
                                      currentViewMode === "period"
                                        ? `<span class="category-chip chapter-chip ${event.chapter}">${event.chapter}</span>`
                                        : `<span class="category-chip period-chip ${CSS.escape(event.period)}">${getPeriodLabel(event.period)}</span>`
                                    }
                                </td>
                                <td>
                                    ${
                                      event.link
                                        ? `<a href="${event.link}" target="_blank" class="event-link">🔗 詳細</a>`
                                        : "-"
                                    }
                                </td>
                            </tr>
                        `,
                          )
                          .join("")}
                    </tbody>
                </table>
            `;

        container.innerHTML = tableHTML;
      }

      function getPeriodLabel(periodValue) {
        const period = periods.find((p) => p.value === periodValue);
        return period ? period.label : periodValue;
      }
    </script>
  </body>
</html>
