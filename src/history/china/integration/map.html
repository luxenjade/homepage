<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/images/chinese-history.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>王朝変遷図 — chinese-history-note</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/map.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="header-logo" href="index.html">
        <span class="header-logo__dot"></span>中国史ノート
      </a>

      <!-- ─── 検索バー ─── -->
      <div class="header-search">
        <svg
          class="header-search__icon"
          viewBox="0 0 20 20"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          aria-hidden="true"
        >
          <circle cx="8.5" cy="8.5" r="5.5" />
          <path d="M15 15l-3-3" stroke-linecap="round" />
        </svg>
        <input
          class="header-search__input"
          id="searchInput"
          type="text"
          placeholder="王朝・人物・制度・イベントを検索… (⌘K)"
          autocomplete="off"
          oninput="handleSearch(this.value)"
        />
        <button
          class="header-search__clear"
          id="searchClear"
          aria-label="検索をクリア"
          onclick="clearSearch()"
        >
          <svg
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
          >
            <path d="M4 4l8 8M12 4l-8 8" stroke-linecap="round" />
          </svg>
        </button>
      </div>

      <nav class="header-nav">
        <a href="index.html">一覧</a>
        <a href="map.html" class="active">変遷図</a>
        <a href="timeline.html">年表</a>
        <a href="culture-quiz.html">クイズ</a>
      </nav>
    </header>

    <div class="layout">
      <main class="main">
        <div id="canvas" class="canvas"></div>
      </main>
      <aside id="rightPanel" class="right">
        <div id="detail" class="detail"></div>
      </aside>
    </div>

    <!-- 帯タイムライン オーバーレイ（JS で位置を設定） -->
    <div
      id="tlOverlay"
      class="tl-overlay"
      role="tooltip"
      aria-live="polite"
    ></div>

    <div id="mobileOverlay" class="mobile-overlay"></div>

    <script src="js/common/dynasties.js"></script>
    <script src="js/common/events.js"></script>
    <script src="js/common/quizdata.js"></script>
    <script src="js/common/icons.js"></script>
    <script src="js/common/search.js"></script>
    <script src="js/map.js"></script>
  </body>
</html>
