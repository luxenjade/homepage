<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>quiz-components デモ</title>


    <!-- quiz-components -->
    <link rel="stylesheet" href="quiz-shell.css" />
    <link rel="stylesheet" href="start/start-screen.css" />
    <link rel="stylesheet" href="progress/progress.css" />
    <link rel="stylesheet" href="question/question-area.css" />
    <link rel="stylesheet" href="answer/answer.css" />
    <link rel="stylesheet" href="feedback/feedback.css" />
    <link rel="stylesheet" href="result/result.css" />

    <style>
      /* ── デモ専用 UI ── */
      .demo-topbar {
        max-width: 860px;
        margin: var(--qz-space-md) auto 0;
        padding: 0 var(--qz-space-sm);
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .demo-tabs {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin: 0 var(--qz-space-sm);
        max-width: 860px;
        margin: var(--qz-space-xs) auto 0;
        padding: 0 var(--qz-space-sm);
      }

      .demo-tab {
        padding: 5px 14px;
        border: 1.5px solid var(--qz-border);
        border-radius: 100px;
        background: var(--qz-surface);
        color: var(--qz-text-sub);
        font-family: inherit;
        font-size: 0.78rem;
        cursor: pointer;
        transition: all 0.15s;
      }

      .demo-tab.is-active {
        border-color: var(--qz-accent);
        background: var(--qz-accent-light);
        color: var(--qz-text);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <!-- テーマトグル（外部 theme-toggle.js が inject） -->
    <span class="logo-switches" id="theme-toggle-container"></span>

    <!-- デモタブ -->
    <div class="demo-topbar">
      <!-- 空（テーマトグルの右寄せスペース確保） -->
    </div>
    <div class="demo-tabs">
      <button class="demo-tab is-active" data-demo="world">
        world（4択・年号→出来事）
      </button>
      <button class="demo-tab" data-demo="china">china（年号入力）</button>
      <button class="demo-tab" data-demo="seikei">seikei（年号入力）</button>
      <button class="demo-tab" data-demo="idiom">idiom（4択・英語）</button>
    </div>

    <!-- 画面 -->
    <main class="qz-container">
      <div id="start-screen" class="qz-screen"></div>

      <div id="quiz-screen" class="qz-screen hidden">
        <div id="qz-progress-bar"></div>
        <div id="qz-question-area"></div>
        <div id="qz-choices"></div>
        <div id="qz-text-input"></div>
        <div id="qz-feedback" class="hidden"></div>
        <div id="qz-nav-buttons"></div>
      </div>

      <div id="result-screen" class="qz-screen hidden"></div>
    </main>

    <!-- quiz-components JS -->
    <script src="start/start-screen.js"></script>
    <script src="progress/progress.js"></script>
    <script src="question/question-area.js"></script>
    <script src="answer/choice-buttons.js"></script>
    <script src="answer/text-input.js"></script>
    <script src="feedback/feedback.js"></script>
    <script src="result/result.js"></script>

    <!-- テーマトグル（外部） -->
    <script src="/js/theme-toggle.js"></script>

    <script>
      // ============================================================
      // サンプル問題データ
      // ============================================================
      const DEMO_Q = {
        world: [
          {
            text: "1789年",
            category: "1701〜1800年",
            correct: "フランス革命",
            options: [
              "フランス革命",
              "アメリカ独立宣言",
              "ナポレオン即位",
              "七年戦争開始",
            ],
          },
          {
            text: "1453年",
            category: "1001〜1500年",
            correct: "東ローマ帝国滅亡",
            options: [
              "十字軍開始",
              "東ローマ帝国滅亡",
              "百年戦争終結",
              "マグナ・カルタ署名",
            ],
          },
          {
            text: "1517年",
            category: "1501〜1700年",
            correct: "宗教改革（ルター）",
            options: [
              "宗教改革（ルター）",
              "コロンブスのアメリカ到達",
              "レパントの海戦",
              "カルヴァン派成立",
            ],
          },
        ],
        china: [
          { text: "秦の統一", category: "王朝成立", correctYear: -221 },
          { text: "黄巾の乱", category: "反乱", correctYear: 184 },
          { text: "唐の成立", category: "王朝成立", correctYear: 618 },
        ],
        seikei: [
          {
            text: "ブレトンウッズ協定",
            sub: "IMF・世界銀行の設立",
            category: "国際経済",
            correctYear: 1944,
          },
          { text: "消費税導入（3%）", category: "国内政治", correctYear: 1989 },
          {
            text: "WTO設立",
            sub: "GATTに代わる国際貿易機関",
            category: "国際経済",
            correctYear: 1995,
          },
        ],
        idiom: [
          {
            text: "It's hard to _____ fact from fiction.",
            sub: "事実とフィクションを区別するのは難しい。",
            correct: "distinguish A from B",
            options: [
              "distinguish A from B",
              "result in",
              "give way to",
              "cope with",
            ],
          },
          {
            text: "She managed to _____ her fear of heights.",
            sub: "彼女はなんとか高所恐怖症を克服した。",
            correct: "get over",
            options: ["get over", "look into", "go through", "bring about"],
          },
          {
            text: "The meeting was _____ due to bad weather.",
            sub: "悪天候のために会議は延期された。",
            correct: "put off",
            options: ["put off", "put down", "put up", "put out"],
          },
        ],
      };

      // ============================================================
      // start-screen configs（4クイズ分）
      // ============================================================
      const CONFIGS = {
        world: {
          title: "世界史年代クイズ",
          subtitle: "年代と出来事を結びつけよう",
          rangeMode: "single",
          rangeLabel: "出題セクション",
          ranges: [
            { id: "~0", label: "紀元前" },
            { id: "1~1000", label: "1〜1000年" },
            { id: "1001~1500", label: "1001〜1500年" },
            { id: "1501~1700", label: "1501〜1700年" },
            { id: "1701~1800", label: "1701〜1800年" },
            { id: "1801~1900", label: "1801〜1900年" },
            { id: "1901~1945", label: "1901〜1945年" },
            { id: "1946~1989", label: "1946〜1989年" },
            { id: "1990~", label: "1990年〜" },
          ],
          countMode: "select",
          countDefault: 10,
          countOptions: [10, 20, 30, "all"],
          onStart: startQuiz,
        },
        china: {
          title: "中国王朝史 年代クイズ",
          subtitle: "紀元前は負の数で入力（例：-221 = 前221年）",
          rangeMode: "multi",
          rangeLabel: "出題カテゴリ",
          ranges: [
            { id: "王朝成立", label: "王朝成立" },
            { id: "王朝滅亡", label: "王朝滅亡" },
            { id: "反乱", label: "反乱" },
            { id: "戦争", label: "戦争" },
            { id: "外交", label: "外交" },
            { id: "内政", label: "内政" },
            { id: "経済", label: "経済" },
            { id: "文化", label: "文化" },
            { id: "その他", label: "その他" },
          ],
          countMode: "slider",
          countMin: 3,
          countMax: 10,
          countDefault: 3,
          onStart: startQuiz,
        },
        seikei: {
          title: "政治・経済 年代クイズ",
          subtitle: "戦後経済史の年代を答えよう",
          rangeMode: "multi",
          rangeLabel: "出題カテゴリ",
          ranges: [
            { id: "国際政治", label: "国際政治" },
            { id: "国際経済", label: "国際経済" },
            { id: "国内政治", label: "国内政治" },
            { id: "日銀金融政策", label: "日銀金融政策" },
            { id: "農業", label: "農業" },
            { id: "消費者生活・公害対策", label: "消費者・公害" },
            { id: "労働問題", label: "労働問題" },
            { id: "社会保障", label: "社会保障" },
          ],
          countMode: "slider",
          countMin: 3,
          countMax: 10,
          countDefault: 3,
          onStart: startQuiz,
        },
        idiom: {
          title: "Vintage イディオムクイズ",
          subtitle: "Fill-in-the-blank idiom questions",
          rangeMode: "single",
          rangeLabel: "Quiz Mode",
          ranges: [
            { id: "random", label: "Random Practice（全問からランダム）" },
            { id: "difficult", label: "Focus on Weak Areas（正答率50%未満）" },
            { id: "unattempted", label: "Not Yet Attempted（未挑戦問題）" },
            { id: "mixed", label: "Mixed Review（Smart Mix）" },
          ],
          countMode: "select",
          countDefault: 10,
          countOptions: [5, 10, 20, 30, 50, "all"],
          startLabel: "Start Quiz",
          onStart: startQuiz,
        },
      };

      // ============================================================
      // クイズ制御
      // ============================================================
      let currentDemo = "world";
      let quizQ = [];
      let currentIndex = 0;
      let correctCount = 0;
      let mistakes = [];

      const isInput = () => currentDemo === "china" || currentDemo === "seikei";
      const fmtYear = (y) => (y < 0 ? `前${Math.abs(y)}年` : `${y}年`);

      // ── 画面切替 ───────────────────────────────────────────────
      function showScreen(id) {
        ["start-screen", "quiz-screen", "result-screen"].forEach((s) =>
          document.getElementById(s).classList.add("hidden"),
        );
        document.getElementById(id).classList.remove("hidden");
      }

      // ── クイズ開始 ─────────────────────────────────────────────
      function startQuiz() {
        quizQ = [...DEMO_Q[currentDemo]];
        currentIndex = 0;
        correctCount = 0;
        mistakes = [];

        initProgress({
          total: quizQ.length,
          lastLabel: "結果を見る",
          resetConfirm: "最初に戻りますか？進捗はリセットされます。",
          onNext: advanceQuestion,
          onReset: resetQuiz,
        });

        showScreen("quiz-screen");
        renderQuestion(0);
      }

      // ── 問題描画 ───────────────────────────────────────────────
      function renderQuestion(i) {
        hideFeedback();
        updateProgress(i);

        const q = quizQ[i];

        // 問題文
        showQuestion({
          text: q.text,
          sub: q.sub ?? null,
          category: q.category ?? null,
        });

        // 回答エリアをリセット
        document.getElementById("qz-choices").innerHTML = "";
        document.getElementById("qz-text-input").innerHTML = "";

        if (isInput()) {
          // ── 年号入力 ──────────────────────────────────────────
          showTextInput({
            label: "年を入力",
            placeholder: "例: 1789",
            hint:
              currentDemo === "china"
                ? "紀元前は負の数で入力（例：-221 = 前221年）"
                : "",
            validate(raw) {
              const n = parseInt(raw, 10);
              if (isNaN(n))
                return { ok: false, message: "数字を入力してください" };
              return { ok: true, value: n, isCorrect: n === q.correctYear };
            },
            onAnswer({ value, isCorrect }) {
              const userLabel = fmtYear(value);
              const correctLabel = fmtYear(q.correctYear);

              if (isCorrect) correctCount++;
              else
                mistakes.push({
                  questionText: q.text,
                  category: q.category ?? null,
                  userAnswer: userLabel,
                  correctAnswer: correctLabel,
                });

              showFeedback({
                isCorrect,
                correctLabel: isCorrect ? null : correctLabel,
                userLabel: isCorrect ? null : userLabel,
              });
            },
          });
        } else {
          // ── 4択 ───────────────────────────────────────────────
          showChoices({
            options: q.options,
            correct: q.correct,
            onAnswer({ isCorrect, selected }) {
              if (isCorrect) correctCount++;
              else
                mistakes.push({
                  questionText: q.text,
                  category: q.category ?? null,
                  userAnswer: selected,
                  correctAnswer: q.correct,
                });

              showFeedback({
                isCorrect,
                correctLabel: isCorrect ? null : q.correct,
                userLabel: isCorrect ? null : selected,
              });
            },
          });
        }
      }

      // ── 次へ / 結果 ────────────────────────────────────────────
      function advanceQuestion(idx) {
        const next = idx + 1;
        if (next < quizQ.length) {
          currentIndex = next;
          renderQuestion(next);
          return;
        }

        showScreen("result-screen");
        showResult({
          correct: correctCount,
          total: quizQ.length,
          mistakes,
          onRetry: resetQuiz,
          onRetryMistakes(ms) {
            // 間違えた問題だけ再出題
            quizQ = ms
              .map((m) =>
                DEMO_Q[currentDemo].find((q) => q.text === m.questionText),
              )
              .filter(Boolean);

            if (!quizQ.length) {
              resetQuiz();
              return;
            }

            currentIndex = correctCount = 0;
            mistakes = [];

            initProgress({
              total: quizQ.length,
              lastLabel: "結果を見る",
              resetConfirm: "最初に戻りますか？",
              onNext: advanceQuestion,
              onReset: resetQuiz,
            });

            showScreen("quiz-screen");
            renderQuestion(0);
          },
        });
      }

      // ── リセット ───────────────────────────────────────────────
      function resetQuiz() {
        const el = document.getElementById("start-screen");
        el.innerHTML = "";
        el.classList.add("hidden");
        showScreen("start-screen");
        initStartScreen(CONFIGS[currentDemo]);
      }

      // ============================================================
      // デモタブ切替
      // ============================================================
      document.querySelectorAll(".demo-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          currentDemo = tab.dataset.demo;
          document
            .querySelectorAll(".demo-tab")
            .forEach((t) => t.classList.toggle("is-active", t === tab));
          resetQuiz();
        });
      });

      // 初期表示
      resetQuiz();
    </script>
  </body>
</html>
