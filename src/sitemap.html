<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Map | luxenjade</title>
    <link rel="icon" href="/images/favicon.ico" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#faba40" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="luxenjade" />
    <link rel="apple-touch-icon" href="/images/favicon.png" />
    <script>
      (function () {
        const t = localStorage.getItem("pref-theme");
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/utils.css" />
    <style>
      html.dark body {
        background-color: var(--color-bg);
        color: var(--color-text-primary);
      }

      /* ── Category block ── */
      .sitemap-category {
        margin-bottom: 2.5rem;
      }

      .sitemap-category__header {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid var(--color-accent);
        margin-bottom: 1rem;
      }

      .sitemap-category__icon {
        font-size: 1rem;
        color: var(--color-accent-text);
      }

      body.dark .sitemap-category__icon {
        color: var(--color-accent);
      }

      .sitemap-category__name {
        font-family:
          "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "YuGothic",
          "Meiryo", sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        color: var(--color-text-primary);
        margin: 0;
      }

      .sitemap-category__count {
        font-size: 0.72rem;
        color: var(--color-text-secondary);
        margin-left: auto;
      }

      /* ── Subsection within a category ── */
      .sitemap-section {
        margin-bottom: 1.25rem;
      }

      .sitemap-section__title {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--color-text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.5rem;
        padding-left: 0.25rem;
      }

      /* ── Link list ── */
      .sitemap-links {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .sitemap-links li a {
        display: flex;
        align-items: baseline;
        gap: 0.5rem;
        padding: 0.45rem 0.6rem;
        border-radius: 6px;
        text-decoration: none;
        color: var(--color-text-secondary);
        font-size: 0.9rem;
        transition:
          background 0.12s,
          color 0.12s;
        line-height: 1.5;
      }

      .sitemap-links li a:hover {
        background: var(--color-surface);
        color: var(--color-text-primary);
        text-decoration: none;
      }

      .sitemap-links li a .link-title {
        color: var(--color-text-primary);
        font-weight: 500;
      }

      .sitemap-links li a .link-desc {
        font-size: 0.8rem;
        color: var(--color-text-secondary);
      }

      .sitemap-links li a .link-ext {
        font-size: 0.7rem;
        opacity: 0.5;
        flex-shrink: 0;
        margin-left: auto;
      }

      /* ── Static pages block ── */
      .static-pages {
        margin-bottom: 2.5rem;
      }

      /* ── Loading / error ── */
      .sitemap-loading {
        color: var(--color-text-secondary);
        font-size: 0.9rem;
        padding: 1rem 0;
      }

      .sitemap-error {
        color: var(--color-text-secondary);
        font-size: 0.875rem;
        font-style: italic;
      }

      @media (min-width: 768px) {
        .sitemap-grid {
          column-count: 2;
          column-gap: 2rem;
        }
        .sitemap-category {
          break-inside: avoid;
        }
      }

      @media (min-width: 1100px) {
        .sitemap-grid {
          column-count: 3;
        }
      }
    </style>
  </head>
  <body>
    <div id="nav-container"></div>

    <main class="container py-5">
      <div
        class="page-header mb-5"
        style="padding-top: 1rem; padding-bottom: 1.5rem"
      >
        <h1 class="page-header__title">Site Map</h1>
        <p class="page-header__desc">List of all content on luxenjade</p>
      </div>

      <!-- Static pages -->
      <div class="static-pages">
        <div class="sitemap-category__header">
          <i class="bi bi-house sitemap-category__icon"></i>
          <h2 class="sitemap-category__name">Site-wide</h2>
        </div>
        <ul class="sitemap-links">
          <li>
            <a href="/index.html">
              <span class="link-title">Home</span>
              <span class="link-desc">Main page</span>
            </a>
          </li>
          <li>
            <a href="/about/">
              <span class="link-title">About</span>
              <span class="link-desc">Profile & Projects</span>
            </a>
          </li>
          <li>
            <a href="/projects/">
              <span class="link-title">Projects</span>
              <span class="link-desc">External Sites</span>
            </a>
          </li>
          <li>
            <a href="/links/">
              <span class="link-title">Learning Links</span>
              <span class="link-desc">Recommended Learning Sites</span>
            </a>
          </li>
          <li>
            <a href="/sitemap.html">
              <span class="link-title">Site Map</span>
              <span class="link-desc">This page</span>
            </a>
          </li>
          <li>
            <a href="/privacy-policy.html">
              <span class="link-title">Privacy Policy</span>
              <span class="link-desc">Data Handling Policy</span>
            </a>
          </li>
        </ul>
      </div>

      <!-- build:sitemap-categories -->
      <div id="sitemap-grid" class="sitemap-grid">
        <div class="sitemap-loading">
          <i class="bi bi-arrow-repeat me-1"></i> Loading content...
        </div>
      </div>
    </main>

    <footer id="site-footer"></footer>

    <script src="/js/icons.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/theme-toggle.js"></script>

    <script>
      if (document.documentElement.classList.contains("dark")) {
        document.body.classList.add("dark");
      }
    </script>
  </body>
</html>
