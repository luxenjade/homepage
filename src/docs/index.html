<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading…</title>
    <link rel="icon" href="images/s-docs.svg" />
    <link rel="icon" href="images/451-docs-favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/home.css" />
    <style>
      .card--protected {
        border-color: var(--accent);
      }
      .card-protected-thumb {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        font-size: 2.5rem;
        background: var(--surface);
      }
      .card-protected-badge {
        display: inline-block;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: var(--accent);
        color: #fff;
        padding: 2px 10px;
        border-radius: 20px;
        margin-bottom: 6px;
      }
      .card-thumb-placeholder {
        width: 100%;
        height: 100%;
        background: linear-gradient(
          135deg,
          var(--surface) 0%,
          var(--border) 100%
        );
      }
    </style>
  </head>
  <body>
    <span class="logo-switches" id="theme-toggle-container"></span>
    <div class="overlay" id="overlay"></div>

    <button class="toc-toggle" id="tocToggle" aria-label="投稿一覧を開く">
      <span class="icon">☰</span>
      <span class="label">Posts</span>
    </button>

    <aside class="toc" id="toc">
      <h3>Posts</h3>
      <nav id="tocList"></nav>
    </aside>

    <header class="profile-hero">
      <div class="profile-hero-inner">
        <div class="profile-left" id="hero-avatar-wrap">
          <div class="profile-avatar">
            <img id="hero-avatar" src="" alt="Profile" />
          </div>
        </div>
        <div class="profile-right">
          <p class="profile-label" id="hero-label"></p>
          <h1 class="profile-name" id="hero-title"></h1>
          <p id="hero-owner"></p>
          <p class="profile-bio" id="hero-bio"></p>
          <div class="profile-links" id="profile-links"></div>
        </div>
      </div>
    </header>

    <main class="posts-section">
      <div class="posts-header">
        <h2 class="posts-heading" id="posts-heading"></h2>
        <span class="posts-count" id="posts-count"></span>
        <div class="search-wrap">
          <svg
            class="search-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            aria-hidden="true"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            type="search"
            id="post-search"
            class="search-input"
            placeholder="Search posts…"
            autocomplete="off"
            spellcheck="false"
          />
          <button
            class="search-clear"
            id="search-clear"
            aria-label="Clear search"
            style="display: none"
          >
            ✕
          </button>
        </div>
      </div>
      <div id="active-category-bar" style="display: none">
        <span id="active-category-label"></span>
        <button id="active-category-clear" aria-label="Clear filter">
          Clear filter
        </button>
      </div>
      <div class="home-container" id="home-container"></div>
    </main>

    <footer class="site-footer-bottom">
      <p id="footer-text"></p>
    </footer>

    <script src="js/theme-toggle.js"></script>
    <script src="js/index-logic.js"></script>
  </body>
</html>
