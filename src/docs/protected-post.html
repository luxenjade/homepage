<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protected Post — My Notes</title>
    <link rel="icon" type="image/svg+xml" href="images/s-docs.svg" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/protected-post.css" />
    <!-- Marked.js: needed for every protected post -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>

  <body>
    <div id="page-loader"></div>

    <!-- Theme Toggle -->
    <span class="logo-switches" id="theme-toggle-container"></span>

    <!-- TOC: hidden until buildToc() reveals them -->
    <div class="overlay" id="overlay"></div>

    <button class="toc-toggle" id="tocToggle" style="display: none">
      <span class="icon">☰</span>
      <span class="label">目次</span>
    </button>

    <aside class="toc" id="toc">
      <h3>Table of Contents</h3>
      <nav id="tocList"></nav>
    </aside>

    <!-- Password Overlay -->
    <div class="password-overlay" id="password-overlay">
      <div class="password-dialog">
        <p id="overlay-post-title" class="overlay-post-title"></p>
        <h2>🔒 Protected Post</h2>
        <p>Please enter the password to view this post.</p>
        <form id="password-form">
          <input
            type="password"
            id="password-input"
            class="password-input"
            placeholder="Password"
            autocomplete="off"
            required
          />
          <button type="submit" class="password-submit">
            <span id="submit-text">View Post</span>
            <div class="loading-spinner" id="loading-spinner"></div>
          </button>
        </form>
        <p class="password-error" id="password-error">Incorrect password.</p>
      </div>
    </div>

    <!-- Post Header (shown after auth) -->
    <div class="post-header" id="post-header" style="display: none">
      <a href="index.html" class="back-link">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          style="
            width: 14px;
            height: 14px;
            vertical-align: middle;
            margin-right: 4px;
          "
        >
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Home
      </a>
      <h1 id="post-title"></h1>
      <div class="post-meta-line" id="post-meta"></div>
      <div class="post-tags" id="post-tags"></div>
    </div>

    <article class="article" id="article">
      <nav class="toc-box" id="tocBox" style="display: none">
        <h3>目次</h3>
        <ul></ul>
      </nav>

      <div id="markdown-content">
        <p style="text-align: center; color: var(--sub); padding: 60px 0">
          パスワードを入力して記事を表示してください。
        </p>
      </div>
    </article>

    <footer class="site-footer-bottom">© 2026 Shoei451</footer>

    <script src="js/theme-toggle.js"></script>
    <script src="js/post-common.js"></script>
    <script src="js/protected-post.js"></script>
  </body>
</html>
