<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Africa Independence Atlas - luxenjade</title>
    <link rel="icon" href="../../images/favicon.ico" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav>
      <div class="nav-left">
        <span class="nav-title">アフリカ独立地図</span>
        <span class="nav-sub">Africa Independence Atlas</span>
      </div>

      <div class="mode-toggle">
        <button
          class="mode-btn active"
          data-mode="year"
          onclick="switchMode('year')"
        >
          独立年
        </button>
        <button
          class="mode-btn"
          data-mode="colonial"
          onclick="switchMode('colonial')"
        >
          旧宗主国
        </button>
      </div>
      <!-- ここを追加 -->
      <a
        href="quiz.html"
        class="q-btn q-btn--ghost q-btn--sm"
        style="text-decoration: none"
      >
        <svg
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="10" />
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
        Quiz
      </a>
    </nav>

    <div class="main">
      <div class="map-area">
        <div class="map-loading" id="loading">
          <div class="spinner"></div>
          <span>地図を読み込み中…</span>
        </div>

        <svg id="map"></svg>

        <!-- ズームコントロール -->
        <div class="zoom-controls">
          <button class="zoom-btn" onclick="zoomBy(1.5)" title="ズームイン">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
          </button>
          <button
            class="zoom-btn"
            onclick="zoomBy(1 / 1.5)"
            title="ズームアウト"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
            >
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
          </button>
          <button class="zoom-btn reset" onclick="resetZoom()" title="リセット">
            1:1
          </button>
        </div>

        <div class="legend" id="legend"></div>
        <div class="map-tooltip" id="tooltip"></div>
        <div class="map-hint panel-closed" id="hint">
          国をクリックして詳細を表示
        </div>
      </div>

      <div class="side-panel hidden" id="panel">
        <div class="panel-inner">
          <div id="panel-content">
            <div class="panel-empty">
              <svg
                width="40"
                height="40"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
              </svg>
              <p>地図上の国をクリックすると<br />詳細情報が表示されます</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/logic.js"></script>
  </body>
</html>
