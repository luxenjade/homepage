<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>U.S. State Location Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#faba40" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Shoei451" />
    <link rel="apple-touch-icon" href="/images/favicon.png" />

    <!-- フラッシュ防止 -->
    <script>
      (function () {
        const t = localStorage.getItem("pref-theme");
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="/css/utils.css" />
    <style>
      html.dark body {
        background-color: var(--color-bg);
        color: var(--color-text-primary);
      }

      .quiz-header {
        padding: 2rem 0 1.5rem;
        border-bottom: 1px solid var(--color-border);
        margin-bottom: 1.5rem;
      }

      .quiz-header h1 {
        font-size: 1.6rem;
        font-weight: 700;
        margin-bottom: 0.25rem;
      }

      .quiz-header p {
        font-size: 0.95rem;
        color: var(--color-text-secondary);
        margin: 0;
      }

      #question {
        font-size: clamp(1.1rem, 3vw, 1.5rem);
        font-weight: 700;
        margin-top: 0.5rem;
        color: var(--color-text-primary);
      }

      #score {
        margin-top: 0.4rem;
        font-weight: 600;
        color: var(--color-text-secondary);
      }

      /* SVG map */
      #map {
        width: 100%;
        max-width: 900px;
        aspect-ratio: 959 / 593;
        margin: 1.25rem auto;
        display: block;
      }

      #map path {
        fill: #f4e2b8;
        stroke: var(--color-accent);
        stroke-width: 0.8;
        cursor: pointer;
        transition: fill 0.25s;
      }

      body.dark #map path {
        fill: #2a3a1e;
        stroke: var(--color-accent);
      }

      #map path.correct {
        fill: #4caf50 !important;
      }

      #map path.incorrect {
        fill: #f44336 !important;
      }

      @media (pointer: coarse) {
        #map path {
          stroke-width: 1.2;
        }
      }
    </style>
  </head>

  <body>
    <div id="nav-container"></div>

    <main class="container py-4">
      <a
        href="/geography/"
        class="back-link mb-3 d-inline-flex"
      >
        <i class="bi bi-chevron-left me-1"></i> Geography
      </a>

      <div class="quiz-header">
        <h1>U.S. State Location Quiz</h1>
        <p>アメリカの州をクリックして位置を当てよう</p>
      </div>

      <div id="question">Loading…</div>
      <div id="score">Score: 0</div>
      <svg id="map"></svg>
    </main>

    <footer id="site-footer"></footer>

    <script src="../js/icons.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/theme-toggle.js"></script>

    <script>
      if (document.documentElement.classList.contains("dark")) {
        document.body.classList.add("dark");
      }

      const states = [
        { name: "Alabama", abbr: "AL" },
        { name: "Alaska", abbr: "AK" },
        { name: "Arizona", abbr: "AZ" },
        { name: "Arkansas", abbr: "AR" },
        { name: "California", abbr: "CA" },
        { name: "Colorado", abbr: "CO" },
        { name: "Connecticut", abbr: "CT" },
        { name: "Delaware", abbr: "DE" },
        { name: "Florida", abbr: "FL" },
        { name: "Georgia", abbr: "GA" },
        { name: "Hawaii", abbr: "HI" },
        { name: "Idaho", abbr: "ID" },
        { name: "Illinois", abbr: "IL" },
        { name: "Indiana", abbr: "IN" },
        { name: "Iowa", abbr: "IA" },
        { name: "Kansas", abbr: "KS" },
        { name: "Kentucky", abbr: "KY" },
        { name: "Louisiana", abbr: "LA" },
        { name: "Maine", abbr: "ME" },
        { name: "Maryland", abbr: "MD" },
        { name: "Massachusetts", abbr: "MA" },
        { name: "Michigan", abbr: "MI" },
        { name: "Minnesota", abbr: "MN" },
        { name: "Mississippi", abbr: "MS" },
        { name: "Missouri", abbr: "MO" },
        { name: "Montana", abbr: "MT" },
        { name: "Nebraska", abbr: "NE" },
        { name: "Nevada", abbr: "NV" },
        { name: "New Hampshire", abbr: "NH" },
        { name: "New Jersey", abbr: "NJ" },
        { name: "New Mexico", abbr: "NM" },
        { name: "New York", abbr: "NY" },
        { name: "North Carolina", abbr: "NC" },
        { name: "North Dakota", abbr: "ND" },
        { name: "Ohio", abbr: "OH" },
        { name: "Oklahoma", abbr: "OK" },
        { name: "Oregon", abbr: "OR" },
        { name: "Pennsylvania", abbr: "PA" },
        { name: "Rhode Island", abbr: "RI" },
        { name: "South Carolina", abbr: "SC" },
        { name: "South Dakota", abbr: "SD" },
        { name: "Tennessee", abbr: "TN" },
        { name: "Texas", abbr: "TX" },
        { name: "Utah", abbr: "UT" },
        { name: "Vermont", abbr: "VT" },
        { name: "Virginia", abbr: "VA" },
        { name: "Washington", abbr: "WA" },
        { name: "West Virginia", abbr: "WV" },
        { name: "Wisconsin", abbr: "WI" },
        { name: "Wyoming", abbr: "WY" },
      ];

      let currentState = null;
      let score = 0;
      let topoData = null;

      function pickState() {
        document
          .querySelectorAll("#map path")
          .forEach((p) => p.classList.remove("correct", "incorrect"));
        currentState = states[Math.floor(Math.random() * states.length)];
        document.getElementById("question").textContent =
          `Click on: ${currentState.name}`;
      }

      function handleClick(abbr, el) {
        if (!currentState) return;
        if (document.querySelector(".correct, .incorrect")) return;

        const correctEl = [...document.querySelectorAll("#map path")].find(
          (p) => p.dataset.abbr === currentState.abbr,
        );

        if (abbr === currentState.abbr) {
          el.classList.add("correct");
          score++;
          document.getElementById("score").textContent = `Score: ${score}`;
        } else {
          el.classList.add("incorrect");
          correctEl?.classList.add("correct");
        }

        setTimeout(pickState, 1500);
      }

      function renderMap() {
        const svg = document.getElementById("map");
        const width = svg.clientWidth;
        const height = width * (593 / 959);

        svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
        svg.innerHTML = "";

        const projection = d3
          .geoAlbersUsa()
          .scale(width * 1.35)
          .translate([width / 2, height / 2]);

        const path = d3.geoPath().projection(projection);
        const features = topojson.feature(
          topoData,
          topoData.objects.states,
        ).features;

        features.forEach((d) => {
          const abbr = idToAbbr(d.id);
          if (!abbr) return;

          const el = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "path",
          );
          el.setAttribute("d", path(d));
          el.dataset.abbr = abbr;
          el.addEventListener("click", () => handleClick(abbr, el));
          svg.appendChild(el);
        });
      }

      function idToAbbr(id) {
        const map = {
          "01": "AL",
          "02": "AK",
          "04": "AZ",
          "05": "AR",
          "06": "CA",
          "08": "CO",
          "09": "CT",
          10: "DE",
          11: "DC",
          12: "FL",
          13: "GA",
          15: "HI",
          16: "ID",
          17: "IL",
          18: "IN",
          19: "IA",
          20: "KS",
          21: "KY",
          22: "LA",
          23: "ME",
          24: "MD",
          25: "MA",
          26: "MI",
          27: "MN",
          28: "MS",
          29: "MO",
          30: "MT",
          31: "NE",
          32: "NV",
          33: "NH",
          34: "NJ",
          35: "NM",
          36: "NY",
          37: "NC",
          38: "ND",
          39: "OH",
          40: "OK",
          41: "OR",
          42: "PA",
          44: "RI",
          45: "SC",
          46: "SD",
          47: "TN",
          48: "TX",
          49: "UT",
          50: "VT",
          51: "VA",
          53: "WA",
          54: "WV",
          55: "WI",
          56: "WY",
        };
        return map[String(id).padStart(2, "0")];
      }

      /* D3 + TopoJSON 読み込み */
      const d3Script = document.createElement("script");
      d3Script.src = "https://d3js.org/d3.v7.min.js";
      d3Script.onload = () => {
        const topoScript = document.createElement("script");
        topoScript.src = "https://unpkg.com/topojson-client@3";
        topoScript.onload = () => {
          fetch("https://cdn.jsdelivr.net/npm/us-atlas/states-10m.json")
            .then((r) => r.json())
            .then((data) => {
              topoData = data;
              renderMap();
              pickState();
              window.addEventListener("resize", renderMap);
            });
        };
        document.body.appendChild(topoScript);
      };
      document.body.appendChild(d3Script);
    </script>
  </body>
</html>
