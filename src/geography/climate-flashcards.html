<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>地理総合 世界の気候 | フラッシュカード</title>
    <style>
      /* ══════════════════════════════════════
       CSS Variables & Theme
       ══════════════════════════════════════ */
      :root {
        --hue: 140;
        --hue-sub: 40;
        --accent: hsl(var(--hue), 42%, 32%);
        --accent-mid: hsl(var(--hue), 48%, 44%);
        --accent-sub: hsl(var(--hue-sub), 52%, 48%);
        --accent-bg: hsl(var(--hue), 30%, 96%);
        --accent-border: hsl(var(--hue), 20%, 82%);
        --bg: #f7f7f5;
        --surface: #ffffff;
        --border: #e2e2de;
        --border-2: #d0d0cb;
        --text: #1a1a18;
        --text-2: #5a5a55;
        --text-3: #9a9a94;
        --shadow: rgba(0, 0, 0, 0.1);
        --c-knew: #3a7d44;
        --c-unsure: #c8922a;
        --c-forgot: #c0392b;
        --font-serif: "Noto Serif JP", "Hiragino Mincho ProN", serif;
        --font-sans: "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
        --header-h: 52px;
        --card-max: 580px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-serif);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 39px,
          rgba(0, 0, 0, 0.018) 40px
        );
      }

      /* ── Header ── */
      .site-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        box-shadow: 0 1px 8px var(--shadow);
        height: var(--header-h);
      }
      .header-inner {
        height: 100%;
        padding: 0 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .header-icon {
        font-size: 1.3rem;
        color: var(--accent);
      }
      .header-title {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text);
        letter-spacing: 0.1em;
      }
      .header-sub {
        font-size: 0.72rem;
        color: var(--text-3);
        font-family: var(--font-sans);
        margin-left: 4px;
      }

      /* ── Mode panels ── */
      .mode-panel {
        display: none;
      }
      .mode-panel.active {
        display: block;
      }

      /* ── Start overlay ── */
      .start-overlay {
        position: fixed;
        top: var(--header-h);
        inset-inline: 0;
        bottom: 0;
        z-index: 120;
        background: rgba(247, 247, 245, 0.94);
        backdrop-filter: blur(4px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 20px 16px 40px;
        overflow-y: auto;
      }
      .title-block {
        margin: 24px 0 20px;
        text-align: center;
      }
      .title-kana {
        font-size: 0.75rem;
        letter-spacing: 0.4em;
        color: var(--text-3);
        margin-bottom: 6px;
        font-family: var(--font-sans);
      }
      .title-main {
        font-size: clamp(2rem, 6vw, 3rem);
        font-weight: 700;
        color: var(--text);
        letter-spacing: 0.15em;
      }
      .title-divider {
        width: 60px;
        height: 2px;
        margin: 14px auto 12px;
        background: linear-gradient(to right, var(--accent), var(--accent-sub));
      }
      .title-sub {
        font-size: 0.8rem;
        color: var(--text-3);
        letter-spacing: 0.25em;
        font-family: var(--font-sans);
      }
      .start-card {
        width: min(600px, 100%);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: 0 8px 28px var(--shadow);
        padding: 22px;
      }
      .start-title {
        font-size: 1.1rem;
        color: var(--text);
        margin-bottom: 4px;
        letter-spacing: 0.06em;
      }
      .start-desc {
        color: var(--text-3);
        font-size: 0.8rem;
        font-family: var(--font-sans);
        margin-bottom: 14px;
      }
      .start-block + .start-block {
        margin-top: 12px;
      }
      .start-label {
        display: block;
        font-size: 0.72rem;
        letter-spacing: 0.2em;
        color: var(--text-3);
        font-family: var(--font-sans);
        margin-bottom: 6px;
      }
      .start-cats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }
      @media (max-width: 400px) {
        .start-cats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      .start-cat {
        border: 1px solid var(--border);
        border-radius: 5px;
        background: var(--bg);
        color: var(--text-3);
        font-family: var(--font-sans);
        font-size: 0.8rem;
        padding: 9px 10px;
        cursor: pointer;
        transition: all 0.14s;
        text-align: center;
      }
      .start-cat:hover {
        border-color: var(--accent-border);
        color: var(--accent);
        background: var(--accent-bg);
      }
      .start-cat.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .start-count {
        width: 100%;
        padding: 9px 11px;
        border: 1px solid var(--border);
        border-radius: 5px;
        font-family: var(--font-serif);
        font-size: 0.88rem;
        background: var(--bg);
        color: var(--text);
        outline: none;
        transition: border-color 0.15s;
      }
      .start-count:focus {
        border-color: var(--accent);
        background: var(--surface);
      }
      .start-meta {
        margin-top: 12px;
        font-size: 0.78rem;
        color: var(--accent);
        font-family: var(--font-sans);
      }
      .start-btn {
        width: 100%;
        margin-top: 12px;
      }

      /* ── Study area ── */
      #mode-study {
        min-height: 100vh;
        padding: calc(var(--header-h) + 16px) 20px 32px;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      #mode-study.active {
        display: flex;
      }

      /* Progress */
      .progress-strip {
        width: 100%;
        max-width: var(--card-max);
        height: 3px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(to right, var(--accent), var(--accent-sub));
        border-radius: 2px;
        transition: width 0.35s ease;
      }

      /* Nav row */
      .deck-nav-row {
        width: 100%;
        max-width: var(--card-max);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .deck-center {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        flex: 1;
      }
      .deck-indicator {
        font-size: 0.86rem;
        font-weight: 500;
        color: var(--text-2);
        font-family: var(--font-sans);
      }
      .mastery-dots {
        display: flex;
        gap: 4px;
        justify-content: center;
        flex-wrap: wrap;
        min-height: 8px;
      }
      .m-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--border-2);
        transition: background 0.22s;
      }
      .m-dot.knew {
        background: var(--c-knew);
      }
      .m-dot.unsure {
        background: var(--c-unsure);
      }
      .m-dot.forgot {
        background: var(--c-forgot);
      }
      .m-dot.current {
        background: var(--accent);
        box-shadow: 0 0 0 2px var(--accent-bg);
      }
      .nav-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--surface);
        font-size: 1.15rem;
        color: var(--text-2);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 1px 4px var(--shadow);
        flex-shrink: 0;
        transition: all 0.14s;
      }
      .nav-btn:hover {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .nav-btn:disabled {
        opacity: 0.2;
        cursor: default;
      }

      /* Flip card */
      .card-scene {
        width: 100%;
        max-width: var(--card-max);
        aspect-ratio: 8/5;
        perspective: 1100px;
        cursor: pointer;
        user-select: none;
      }
      .card-scene.is-swapping {
        pointer-events: none;
      }
      .card-scene.swap-out-left {
        animation: swapOutL 140ms ease forwards;
      }
      .card-scene.swap-out-right {
        animation: swapOutR 140ms ease forwards;
      }
      .card-scene.swap-in-right {
        animation: swapInR 180ms ease forwards;
      }
      .card-scene.swap-in-left {
        animation: swapInL 180ms ease forwards;
      }
      @keyframes swapOutL {
        to {
          opacity: 0;
          transform: translateX(-14px) scale(0.986);
        }
      }
      @keyframes swapOutR {
        to {
          opacity: 0;
          transform: translateX(14px) scale(0.986);
        }
      }
      @keyframes swapInR {
        from {
          opacity: 0;
          transform: translateX(14px) scale(0.986);
        }
      }
      @keyframes swapInL {
        from {
          opacity: 0;
          transform: translateX(-14px) scale(0.986);
        }
      }

      .card-body {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.52s cubic-bezier(0.4, 0.2, 0.2, 1);
        border-radius: 8px;
      }
      .card-body.no-flip-transition {
        transition: none !important;
      }
      .card-body.flipped {
        transform: rotateY(180deg);
      }

      .card-face {
        position: absolute;
        inset: 0;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        border-radius: 8px;
        overflow: hidden;
        box-shadow:
          0 4px 20px var(--shadow),
          0 1px 4px rgba(0, 0, 0, 0.06);
      }
      .card-face-inner {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px 22px;
        position: relative;
      }
      .card-front {
        background: var(--surface);
        border: 1px solid var(--border);
      }
      .card-front::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(to right, var(--accent), var(--accent-sub));
      }
      .card-back {
        background: var(--accent);
        transform: rotateY(180deg);
      }
      .card-back::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          circle at 75% 20%,
          rgba(255, 255, 255, 0.08),
          transparent 55%
        );
      }
      .card-back::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(
          to right,
          var(--accent-sub),
          var(--accent-mid)
        );
        opacity: 0.6;
      }

      .face-top {
        position: absolute;
        top: 10px;
        left: 12px;
        right: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .face-hint {
        margin-left: auto;
        font-size: 0.62rem;
        color: var(--text-3);
        font-family: var(--font-sans);
        letter-spacing: 0.06em;
      }
      .face-badge {
        font-size: 0.64rem;
        letter-spacing: 0.1em;
        padding: 2px 8px;
        border-radius: 2px;
        font-family: var(--font-sans);
        font-weight: 500;
      }
      .back-badge {
        background: rgba(255, 255, 255, 0.12) !important;
        color: rgba(255, 255, 255, 0.7) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
      }
      .card-question {
        font-size: clamp(0.86rem, 2.2vw, 1.05rem);
        line-height: 1.9;
        color: var(--text);
        text-align: center;
        white-space: pre-wrap;
        max-height: 130px;
        overflow-y: auto;
      }
      .card-answer {
        font-size: clamp(1rem, 2.7vw, 1.35rem);
        font-weight: 700;
        color: #fff;
        text-align: center;
        line-height: 1.45;
        margin-bottom: 6px;
        letter-spacing: 0.03em;
      }
      .card-sub {
        font-size: 0.72rem;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.65);
        text-align: center;
        max-height: 60px;
        overflow-y: auto;
        padding: 0 4px;
      }
      .card-watermark {
        position: absolute;
        bottom: 8px;
        right: 12px;
        font-size: 0.58rem;
        letter-spacing: 0.3em;
        color: rgba(0, 0, 0, 0.06);
      }
      .back-wm {
        color: rgba(255, 255, 255, 0.1);
      }

      /* Mastery buttons */
      .mastery-row {
        display: flex;
        gap: 8px;
        width: 100%;
        max-width: var(--card-max);
      }
      .mastery-btn {
        flex: 1;
        padding: 10px 4px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        box-shadow: 0 1px 5px var(--shadow);
        opacity: 0.28;
        pointer-events: none;
        transform: translateY(5px);
        transition: all 0.18s;
      }
      .mastery-btn.active {
        opacity: 1;
        pointer-events: all;
        transform: translateY(0);
      }
      .mi {
        font-size: 1.1rem;
        font-weight: 700;
      }
      .ml {
        font-size: 0.66rem;
        font-family: var(--font-sans);
        color: var(--text-3);
      }
      .m-forgot {
        border-color: rgba(192, 57, 43, 0.2);
      }
      .m-forgot .mi {
        color: var(--c-forgot);
      }
      .m-unsure {
        border-color: rgba(200, 146, 42, 0.2);
      }
      .m-unsure .mi {
        color: var(--c-unsure);
      }
      .m-knew {
        border-color: rgba(58, 125, 68, 0.2);
      }
      .m-knew .mi {
        color: var(--c-knew);
      }
      .m-forgot:hover {
        background: var(--c-forgot);
        border-color: var(--c-forgot);
      }
      .m-unsure:hover {
        background: var(--c-unsure);
        border-color: var(--c-unsure);
      }
      .m-knew:hover {
        background: var(--c-knew);
        border-color: var(--c-knew);
      }
      .m-forgot:hover .mi,
      .m-forgot:hover .ml,
      .m-unsure:hover .mi,
      .m-unsure:hover .ml,
      .m-knew:hover .mi,
      .m-knew:hover .ml {
        color: #fff;
      }

      .kb-hint {
        font-size: 0.65rem;
        color: var(--text-3);
        font-family: var(--font-sans);
        letter-spacing: 0.05em;
      }
      kbd {
        display: inline-block;
        padding: 1px 5px;
        border: 1px solid var(--border-2);
        border-radius: 3px;
        font-size: 0.62rem;
        font-family: var(--font-sans);
        background: var(--bg);
        color: var(--text-2);
      }

      /* Complete overlay */
      .complete-overlay {
        position: fixed;
        inset: 0;
        z-index: 200;
        background: rgba(247, 247, 245, 0.88);
        backdrop-filter: blur(6px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .complete-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 36px 28px;
        max-width: 400px;
        width: calc(100% - 32px);
        text-align: center;
        position: relative;
        overflow: hidden;
        box-shadow: 0 10px 36px rgba(0, 0, 0, 0.14);
      }
      .complete-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(
          to right,
          var(--accent),
          var(--accent-sub),
          var(--c-forgot)
        );
      }
      .complete-icon {
        font-size: 2rem;
        color: var(--accent);
        margin-bottom: 8px;
      }
      .complete-title {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--text);
        letter-spacing: 0.18em;
        margin-bottom: 16px;
      }
      .complete-stats {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .stat-pill {
        padding: 8px 14px;
        border-radius: 6px;
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .sp-n {
        font-size: 1.25rem;
        font-weight: 700;
        font-family: var(--font-sans);
        line-height: 1;
      }
      .sp-l {
        font-size: 0.64rem;
        color: var(--text-3);
        font-family: var(--font-sans);
        margin-top: 3px;
      }
      .sp-knew {
        border-color: rgba(58, 125, 68, 0.25);
        background: rgba(58, 125, 68, 0.04);
      }
      .sp-knew .sp-n {
        color: var(--c-knew);
      }
      .sp-unsure {
        border-color: rgba(200, 146, 42, 0.25);
        background: rgba(200, 146, 42, 0.04);
      }
      .sp-unsure .sp-n {
        color: var(--c-unsure);
      }
      .sp-forgot {
        border-color: rgba(192, 57, 43, 0.25);
        background: rgba(192, 57, 43, 0.04);
      }
      .sp-forgot .sp-n {
        color: var(--c-forgot);
      }
      .complete-actions {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
      }

      /* Side list */
      .list-toggle {
        position: fixed;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        background: var(--accent);
        color: #fff;
        padding: 12px 5px;
        border-radius: 6px 0 0 6px;
        cursor: pointer;
        font-size: 0.68rem;
        font-family: var(--font-serif);
        letter-spacing: 0.2em;
        writing-mode: vertical-lr;
        z-index: 80;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        transition: background 0.15s;
      }
      .list-toggle:hover {
        background: var(--accent-mid);
      }
      #listArrow {
        writing-mode: horizontal-tb;
        font-size: 0.82rem;
      }
      .list-panel {
        position: fixed;
        right: -256px;
        top: 0;
        bottom: 0;
        width: 240px;
        background: var(--surface);
        border-left: 1px solid var(--border);
        z-index: 85;
        transition: right 0.24s ease;
        overflow-y: auto;
        box-shadow: -3px 0 16px var(--shadow);
      }
      .list-panel.open {
        right: 0;
      }
      .list-head {
        padding: calc(var(--header-h) + 6px) 14px 10px;
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: 0.12em;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
        position: sticky;
        top: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .list-close {
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-2);
        border-radius: 4px;
        padding: 3px 7px;
        font-size: 0.66rem;
        cursor: pointer;
        transition: background 0.13s;
        font-family: var(--font-sans);
      }
      .list-close:hover {
        background: var(--bg);
      }
      .list-body {
        padding: 5px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .list-item {
        padding: 7px 9px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.75rem;
        line-height: 1.45;
        color: var(--text-2);
        display: flex;
        align-items: flex-start;
        gap: 6px;
        border: 1px solid transparent;
        transition: background 0.12s;
      }
      .list-item:hover {
        background: var(--bg);
      }
      .list-item.current {
        background: var(--accent-bg);
        border-color: var(--accent-border);
      }
      .li-n {
        font-size: 0.64rem;
        color: var(--text-3);
        font-family: var(--font-sans);
        min-width: 16px;
        margin-top: 2px;
      }
      .li-d {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--border-2);
        flex-shrink: 0;
        margin-top: 4px;
      }
      .li-d.knew {
        background: var(--c-knew);
      }
      .li-d.unsure {
        background: var(--c-unsure);
      }
      .li-d.forgot {
        background: var(--c-forgot);
      }
      .li-t {
        flex: 1;
      }

      /* Buttons */

        {

        },
        {
          category: "temperate",
          q: "温暖冬季少雨気候（Cw）の特徴は？",

      ];

      /* ══════════════════════════════════════
       APP LOGIC
       ══════════════════════════════════════ */
      let deck = [];
      let current = 0;
      let mastery = {};
      let isFlipped = false;
      let selectedFilter = "all";
      let isListOpen = false;

      // カテゴリボタン描画
      function renderStartCats() {
        const el = document.getElementById("startCats");
        el.innerHTML = FILTER_DEFS.map(
          (f) =>
            `<button class="start-cat${f.id === selectedFilter ? " active" : ""}"
           onclick="selectFilter('${f.id}')">${f.label}</button>`,
        ).join("");
        updateMeta();
      }

      function selectFilter(id) {
        selectedFilter = id;
        renderStartCats();
      }

      function updateMeta() {
        const filter = FILTER_DEFS.find((f) => f.id === selectedFilter);
        const count = CARDS.filter(filter.match).length;
        document.getElementById("startMeta").textContent =
          `該当カード数：${count}枚`;
      }

      function startStudy() {
        const filter = FILTER_DEFS.find((f) => f.id === selectedFilter);
        let pool = CARDS.filter(filter.match);
        // シャッフル
        pool = pool.sort(() => Math.random() - 0.5);
        // 枚数制限
        const countVal = document.getElementById("startCount").value;
        if (countVal !== "all") pool = pool.slice(0, parseInt(countVal));
        deck = pool;
        mastery = {};
        deck.forEach((_, i) => (mastery[i] = null));
        current = 0;

        document.getElementById("startOverlay").style.display = "none";
        document.getElementById("completeOverlay").style.display = "none";
        document.getElementById("mode-study").classList.add("active");
        renderCard(false);
        renderDots();
        renderList();
      }

      function renderCard(animate) {
        if (deck.length === 0) return;
        const card = deck[current];

        // カードのカテゴリスタイル
        const style = CATEGORY_STYLES[card.category] || CATEGORY_STYLES.default;
        const filter = FILTER_DEFS.find((f) => f.id === card.category);
        const label = filter ? filter.label : card.category;

        // 表面
        document.getElementById("frontBadge").textContent = label;
        document.getElementById("frontBadge").style.background = style.bg;
        document.getElementById("frontBadge").style.color = style.text;
        document.getElementById("frontBadge").style.border =
          `1px solid ${style.text}33`;
        document.getElementById("cardQuestion").textContent = card.q;

        // 裏面
        document.getElementById("backBadge").textContent = label;
        document.getElementById("cardAnswer").textContent = card.a;
        document.getElementById("cardSub").textContent = card.sub || "";

        // 裏面カード色
        document.getElementById("cardBack").style.background = style.card;

        // 進捗
        document.getElementById("progressFill").style.width =
          ((current + 1) / deck.length) * 100 + "%";
        document.getElementById("deckIndicator").textContent =
          `${current + 1} / ${deck.length}`;

        // フリップリセット
        if (!animate) {
          const body = document.getElementById("cardBody");
          body.classList.add("no-flip-transition");
          body.classList.remove("flipped");
          isFlipped = false;
          setTimeout(() => body.classList.remove("no-flip-transition"), 50);
        }

        // 習得ボタン
        setMasteryBtnsActive(false);

        // ナビ
        document.getElementById("prevBtn").disabled = current === 0;
        document.getElementById("nextBtn").disabled =
          current === deck.length - 1;
      }

      function flipCard() {
        const body = document.getElementById("cardBody");
        body.classList.toggle("flipped");
        isFlipped = !isFlipped;
        if (isFlipped) setMasteryBtnsActive(true);
      }

      function setMasteryBtnsActive(on) {
        ["btnForgot", "btnUnsure", "btnKnew"].forEach((id) => {
          const el = document.getElementById(id);
          if (on) el.classList.add("active");
          else el.classList.remove("active");
        });
      }

      function markCard(status) {
        mastery[current] = status;
        renderDots();
        renderList();
        if (current < deck.length - 1) {
          animateNext("right");
        } else {
          showComplete();
        }
      }

      function animateNext(dir) {
        const scene = document.getElementById("cardScene");
        scene.classList.add("is-swapping", `swap-out-${dir}`);
        setTimeout(() => {
          scene.classList.remove(`swap-out-${dir}`);
          current++;
          renderCard(false);
          renderDots();
          renderList();
          scene.classList.add(`swap-in-${dir === "right" ? "right" : "left"}`);
          setTimeout(() => {
            scene.classList.remove(
              "is-swapping",
              `swap-in-${dir === "right" ? "right" : "left"}`,
            );
          }, 200);
        }, 150);
      }

      function animatePrev(dir) {
        const scene = document.getElementById("cardScene");
        scene.classList.add("is-swapping", `swap-out-${dir}`);
        setTimeout(() => {
          scene.classList.remove(`swap-out-${dir}`);
          current--;
          renderCard(false);
          renderDots();
          renderList();
          scene.classList.add(`swap-in-${dir === "left" ? "left" : "right"}`);
          setTimeout(() => {
            scene.classList.remove(
              "is-swapping",
              `swap-in-${dir === "left" ? "left" : "right"}`,
            );
          }, 200);
        }, 150);
      }

      function nextCard() {
        if (current < deck.length - 1) animateNext("right");
      }

      function prevCard() {
        if (current > 0) animatePrev("left");
      }

      function renderDots() {
        const el = document.getElementById("masteryDots");
        el.innerHTML = deck
          .map((_, i) => {
            const s = mastery[i];
            let cls = "m-dot";
            if (i === current) cls += " current";
            else if (s) cls += ` ${s}`;
            return `<div class="${cls}"></div>`;
          })
          .join("");
      }

      function renderList() {
        const el = document.getElementById("listBody");
        el.innerHTML = deck
          .map((card, i) => {
            const s = mastery[i];
            return `<div class="list-item${i === current ? " current" : ""}" onclick="jumpTo(${i})">
          <span class="li-n">${i + 1}</span>
          <div class="li-d${s ? " " + s : ""}"></div>
          <span class="li-t">${card.q}</span>
        </div>`;
          })
          .join("");
      }

      function jumpTo(i) {
        current = i;
        renderCard(false);
        renderDots();
        renderList();
        if (isListOpen) toggleList();
      }

      function showComplete() {
        const knew = Object.values(mastery).filter((v) => v === "knew").length;
        const unsure = Object.values(mastery).filter(
          (v) => v === "unsure",
        ).length;
        const forgot = Object.values(mastery).filter(
          (v) => v === "forgot",
        ).length;
        const unmarked = Object.values(mastery).filter(
          (v) => v === null,
        ).length;

        document.getElementById("completeStats").innerHTML = `
        <div class="stat-pill sp-knew"><span class="sp-n">${knew}</span><span class="sp-l">わかった</span></div>
        <div class="stat-pill sp-unsure"><span class="sp-n">${unsure}</span><span class="sp-l">あやふや</span></div>
        <div class="stat-pill sp-forgot"><span class="sp-n">${forgot + unmarked}</span><span class="sp-l">わからない</span></div>
      `;
        document.getElementById("completeOverlay").style.display = "flex";
      }

      function reviewWeak() {
        const weak = deck.filter(
          (_, i) =>
            mastery[i] === "forgot" ||
            mastery[i] === "unsure" ||
            mastery[i] === null,
        );
        if (weak.length === 0) {
          showToast("復習対象のカードがありません");
          return;
        }
        deck = weak.sort(() => Math.random() - 0.5);
        mastery = {};
        deck.forEach((_, i) => (mastery[i] = null));
        current = 0;
        document.getElementById("completeOverlay").style.display = "none";
        renderCard(false);
        renderDots();
        renderList();
      }

      function restartDeck() {
        deck = deck.sort(() => Math.random() - 0.5);
        mastery = {};
        deck.forEach((_, i) => (mastery[i] = null));
        current = 0;
        document.getElementById("completeOverlay").style.display = "none";
        renderCard(false);
        renderDots();
        renderList();
      }

      function openStartScreen() {
        document.getElementById("completeOverlay").style.display = "none";
        document.getElementById("mode-study").classList.remove("active");
        document.getElementById("startOverlay").style.display = "flex";
      }

      function toggleList() {
        isListOpen = !isListOpen;
        document
          .getElementById("listPanel")
          .classList.toggle("open", isListOpen);
        document.getElementById("listArrow").textContent = isListOpen
          ? "›"
          : "‹";
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("visible");
        setTimeout(() => t.classList.remove("visible"), 2000);
      }

      // Keyboard
      document.addEventListener("keydown", (e) => {
        if (
          document.getElementById("startOverlay").style.display !== "none" &&
          document.getElementById("startOverlay").style.display !== ""
        )
          return;
        if (document.getElementById("completeOverlay").style.display === "flex")
          return;
        switch (e.key) {
          case " ":
            e.preventDefault();
            flipCard();
            break;
          case "ArrowLeft":
            prevCard();
            break;
          case "ArrowRight":
            nextCard();
            break;
          case "1":
            if (isFlipped) markCard("forgot");
            break;
          case "2":
            if (isFlipped) markCard("unsure");
            break;
          case "3":
            if (isFlipped) markCard("knew");
            break;
        }
      });

      // Init
      renderStartCats();
    </script>
  </body>
