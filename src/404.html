<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Page Not Found | luxenjade</title>
    <link rel="icon" href="/images/favicon.ico" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#faba40" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="luxenjade" />
    <link rel="apple-touch-icon" href="/images/favicon.png" />

    <!-- フラッシュ防止 -->
    <script>
      (function () {
        const t = localStorage.getItem("pref-theme");
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/utils.css" />
    <style>
      html.dark body {
        background-color: var(--color-bg);
        color: var(--color-text-primary);
      }

      /* ── 404 Layout ── */
      .error-page {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4rem 1.5rem;
      }

      .error-inner {
        max-width: 520px;
        width: 100%;
        text-align: center;
      }

      /* ── 404 Number ── */
      .error-code {
        font-family:
          "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "YuGothic",
          "Meiryo", sans-serif;
        font-size: clamp(6rem, 20vw, 10rem);
        font-weight: 700;
        line-height: 1;
        color: var(--color-border);
        letter-spacing: -0.04em;
        margin-bottom: 0.5rem;
        user-select: none;
      }

      body.dark .error-code {
        color: var(--color-border);
      }

      /* ── Message ── */
      .error-title {
        font-size: 1.4rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        color: var(--color-text-primary);
      }

      .error-desc {
        font-size: 0.95rem;
        color: var(--color-text-secondary);
        line-height: 1.7;
        margin-bottom: 2.5rem;
      }

      /* ── Actions ── */
      .error-actions {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 3rem;
      }

      .btn-home {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.7rem 1.75rem;
        background: var(--color-accent);
        color: var(--color-accent-text);
        border: none;
        border-radius: 6px;
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        transition:
          opacity 0.15s,
          transform 0.15s;
      }

      .btn-home:hover {
        opacity: 0.88;
        transform: translateY(-1px);
        color: var(--color-accent-text);
        text-decoration: none;
      }

      body.dark .btn-home {
        background: #ffd166;
        color: #111418;
      }

      body.dark .btn-home:hover {
        color: #111418;
      }

      .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.7rem 1.75rem;
        background: transparent;
        color: var(--color-text-secondary);
        border: 1.5px solid var(--color-border);
        border-radius: 6px;
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        transition:
          border-color 0.15s,
          color 0.15s;
      }

      .btn-back:hover {
        border-color: var(--color-accent);
        color: var(--color-text-primary);
        text-decoration: none;
      }

      /* ── Quick Links ── */
      .quick-links {
        border-top: 1px solid var(--color-border);
        padding-top: 2rem;
      }

      .quick-links__label {
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--color-text-secondary);
        margin-bottom: 1rem;
      }

      .quick-links__grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.5rem;
      }

      .quick-link {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 0.9rem;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 6px;
        color: var(--color-text-secondary);
        font-size: 0.875rem;
        text-decoration: none;
        transition:
          border-color 0.15s,
          color 0.15s,
          background 0.15s;
      }

      .quick-link:hover {
        border-color: var(--color-accent);
        color: var(--color-text-primary);
        background: var(--color-surface);
        text-decoration: none;
      }

      .quick-link :is(i, svg) {
        font-size: 1rem;
        color: var(--color-accent-text);
        flex-shrink: 0;
      }

      body.dark .quick-link :is(i, svg) {
        color: var(--color-accent);
      }

      @media (max-width: 400px) {
        .quick-links__grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="nav-container"></div>

    <main class="error-page">
      <div class="error-inner">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-desc">
          お探しのページが見つかりませんでした。<br />
          URLが間違っているか、ページが移動・削除された可能性があります。
        </p>

        <div class="error-actions">
          <a href="/index.html" class="btn-home">
            <i class="bi bi-house"></i>
            Home
          </a>
          <a href="javascript:history.back()" class="btn-back">
            <i class="bi bi-arrow-left"></i>
            Previous Page
          </a>
        </div>

        <div class="quick-links">
          <p class="quick-links__label">Quick Links</p>
          <div class="quick-links__grid">
            <a href="/history/" class="quick-link">
              <i class="bi bi-book"></i>
              History
            </a>
            <a href="/geography/" class="quick-link">
              <i class="bi bi-globe"></i>
              Geography
            </a>
            <a href="/seikei/" class="quick-link">
              <i class="bi bi-bank"></i>
              Politics & Economics
            </a>
            <a href="/miscellaneous/" class="quick-link">
              <i class="bi bi-question-circle"></i>
              Miscellaneous
            </a>
          </div>
        </div>
      </div>
    </main>

    <footer id="site-footer"></footer>
    <script src="/js/icons.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/theme-toggle.js"></script>

    <script>
      if (document.documentElement.classList.contains("dark")) {
        document.body.classList.add("dark");
      }
    </script>
  </body>
</html>
