<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Links — Shoei451</title>
    <link rel="icon" href="/images/favicon.ico" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#faba40" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Shoei451" />
    <link rel="apple-touch-icon" href="/images/favicon.png" />

    <script>
      (function () {
        const t = localStorage.getItem("pref-theme");
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/utils.css" />
  </head>
  <body>
    <div id="nav-container"></div>

    <main class="container py-4">
      <div class="page-header">
        <h1 class="page-header__title">Links</h1>
        <p class="page-header__desc">語句確認フォーム・学習リンク集</p>
      </div>

      <div class="section-header">
        <h2 class="section-header__title">語句確認フォーム</h2>
        <span class="section-header__desc">Google Forms</span>
      </div>
      <div class="card-grid" id="forms-grid"></div>

      <div class="section-header" id="learning-header">
        <h2 class="section-header__title">学習リンク</h2>
        <span class="section-header__desc">参考サイト・資料</span>
      </div>
      <div class="card-grid" id="learning-grid"></div>
    </main>

    <footer id="site-footer"></footer>

    <script src="/js/icons.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/theme-toggle.js"></script>
    <script>
      if (document.documentElement.classList.contains("dark")) {
        document.body.classList.add("dark");
      }

      // build:link-collections
    </script>
  </body>
</html>
