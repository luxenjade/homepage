<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>learning box | luxenjade</title>
    <meta
      name="description"
      content="フラッシュカードとまとめノートをまとめて管理。世界史・地理・古典などの学習ツールを提供しています。"
    />
    <link rel="icon" href="/images/favicon.ico" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#faba40" />
    <link rel="icon" type="image/png" href="/images/favicon.png" />
    <link rel="apple-touch-icon" href="/images/favicon.png" />

    <!-- フラッシュ防止：テーマをCSSより前に適用 -->
    <script>
      (function () {
        const t = localStorage.getItem("pref-theme");
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/utils.css" />
    <link rel="stylesheet" href="css/subject-colors.css" />
    <link rel="stylesheet" href="css/index-style.css" />
    <style>
      html.dark body {
        background-color: var(--color-bg);
        color: var(--color-text-primary);
      }
    </style>
  </head>
  <body>
    <main>
      <div id="nav-container"></div>

      <div class="container py-4">
        <!-- Hero -->
        <div class="site-hero">
          <p class="site-hero__eyebrow">@luxenjade — learning box</p>
          <h1 class="site-hero__title">Learning Tools</h1>
          <p class="site-hero__desc">
            フラッシュカードとまとめノートをまとめて管理。テスト対策や日々の学習に。
          </p>
          <div class="hero-stats">
            <div class="hero-stat">
              <strong>{{FLASHCARD_COUNT}}</strong>
              Flashcard sets
            </div>
            <div class="hero-stat">
              <strong>{{NOTE_COUNT}}</strong>
              Note sets
            </div>
          </div>
        </div>

        <div class="section-divider">
          <span class="section-divider__title">Flashcards</span>
        </div>
        <div class="index-card-grid" id="fcGrid">{{FLASHCARD_CARDS}}</div>

        <div class="section-divider">
          <span class="section-divider__title">Summary Notes</span>
        </div>
        <div class="index-card-grid" id="notesGrid">{{NOTE_CARDS}}</div>
      </div>
    </main>

    <footer id="site-footer"></footer>

    <script src="/js/icons.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/theme-toggle.js"></script>
    <script>
      if (document.documentElement.classList.contains("dark")) {
        document.body.classList.add("dark");
      }
    </script>
  </body>
</html>
