<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>政治・経済 学習用オンライン年表 (印刷用)</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/wh-utils.js"></script>
    <style>
      @media print {
        @page {
          size: A4;
          margin: 15mm;
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "YuGothic",
          "Meiryo", sans-serif;
        font-size: 11pt;
        line-height: 1.5;
        color: #000;
        background: #fff;
      }

      .print-header {
        text-align: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 3px solid #1a2b3c;
      }

      .print-header h1 {
        font-size: 20pt;
        color: #1a2b3c;
        margin-bottom: 5px;
      }

      .print-info {
        font-size: 9pt;
        color: #666;
        margin-top: 5px;
      }

      .category-section {
        page-break-inside: avoid;
        margin-bottom: 30px;
      }

      .category-header {
        background: #1a2b3c;
        color: #fff;
        padding: 8px 12px;
        font-size: 13pt;
        font-weight: bold;
        margin-bottom: 10px;
      }

      .timeline-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
      }

      .timeline-table th {
        background: #f5f5f5;
        border: 1px solid #333;
        padding: 8px;
        text-align: left;
        font-weight: bold;
        font-size: 10pt;
      }

      .timeline-table td {
        border: 1px solid #666;
        padding: 8px;
        vertical-align: top;
      }

      .timeline-table tbody tr {
        page-break-inside: avoid;
      }

      .event-date {
        font-weight: bold;
        white-space: nowrap;
        width: 100px;
      }

      .event-category {
        width: 80px;
        font-size: 9pt;
      }

      .event-title {
        font-weight: 600;
        width: 200px;
      }

      .event-description {
        font-size: 10pt;
        color: #333;
      }

      .category-chip {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 10px;
        font-size: 9pt;
        font-weight: 600;
        white-space: nowrap;
      }

      .category-chip.国際政治 {
        background: #e3f2fd;
        color: #1565c0;
      }

      .category-chip.国際経済 {
        background: #fff9c4;
        color: #f57f17;
      }

      .category-chip.国内政治 {
        background: #bbdefb;
        color: #0d47a1;
      }

      .category-chip.日銀金融政策 {
        background: #e8f5e9;
        color: #2e7d32;
      }

      .category-chip.農業 {
        background: #f1f8e9;
        color: #558b2f;
      }

      .category-chip.消費者生活・公害対策 {
        background: #e0f2f1;
        color: #00695c;
      }

      .category-chip.労働問題 {
        background: #fce4ec;
        color: #c2185b;
      }

      .category-chip.社会保障 {
        background: #fff3e0;
        color: #e65100;
      }

      .loading {
        text-align: center;
        padding: 40px;
        font-size: 14pt;
      }

      .controls {
        margin: 20px 0;
        text-align: center;
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .controls button,
      .controls select {
        padding: 10px 20px;
        font-size: 11pt;
        border: 2px solid #1a2b3c;
        background: #fff;
        color: #1a2b3c;
        cursor: pointer;
        border-radius: 5px;
        font-weight: 600;
      }

      .controls button:hover {
        background: #1a2b3c;
        color: #fff;
      }

      @media screen {
        body {
          max-width: 1200px;
          margin: 0 auto;
          padding: 20px;
        }
      }

      @media print {
        .controls {
          display: none !important;
        }

        .print-header {
          margin-bottom: 15px;
        }

        .category-section {
          margin-bottom: 25px;
        }
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <select id="categoryFilter">
        <option value="all">すべてのカテゴリ</option>
        <option value="国際政治">国際政治</option>
        <option value="国際経済">国際経済</option>
        <option value="国内政治">国内政治</option>
        <option value="日銀金融政策">日銀金融政策</option>
        <option value="農業">農業</option>
        <option value="消費者生活・公害対策">消費者生活・公害対策</option>
        <option value="労働問題">労働問題</option>
        <option value="社会保障">社会保障</option>
      </select>
      <button onclick="window.print()">🖨️ 印刷</button>
    </div>

    <div class="print-header">
      <h1>政治・経済 学習用オンライン年表</h1>
      <div class="print-info" id="printDate"></div>
    </div>

    <div id="timelineContainer">
      <div class="loading">読み込み中...</div>
    </div>

    <script type="module">
      import { db, tables } from "/js/supabase_config.js";

      let events = [];
      let selectedCategory = "all";

      // Set print date
      document.getElementById("printDate").textContent =
        `印刷日: ${new Date().toLocaleDateString("ja-JP", { year: "numeric", month: "long", day: "numeric" })}`;

      // Load events
      async function loadEvents() {
        try {
          const { data, error } = await db
            .from(tables.SEIKEI)
            .select("*")
            .order("date", { ascending: true });

          if (error) throw error;
          events = data || [];
          renderTimeline();
        } catch (error) {
          console.error("Error loading events:", error);
          document.getElementById("timelineContainer").innerHTML = `
                    <p style="text-align: center; color: #666;">
                        ⚠️ データの読み込みに失敗しました<br>
                        Supabaseの設定を確認してください
                    </p>
                `;
        }
      }

      // Render timeline grouped by category
      function renderTimeline() {
        const container = document.getElementById("timelineContainer");

        const filteredEvents =
          selectedCategory === "all"
            ? events
            : events.filter((e) => e.category === selectedCategory);

        if (filteredEvents.length === 0) {
          container.innerHTML =
            '<p style="text-align: center;">イベントがありません</p>';
          return;
        }

        // If "all categories" is selected, show unified table with color-coded chips
        if (selectedCategory === "all") {
          const tableHTML = `
                    <table class="timeline-table">
                        <thead>
                            <tr>
                                <th style="width: 100px;">日付</th>
                                <th style="width: 120px;">カテゴリ</th>
                                <th style="width: 200px;">イベント名</th>
                                <th>説明</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${filteredEvents
                              .map(
                                (event) => `
                                <tr>
                                    <td class="event-date">${formatDate(event.date, event.date_type)}</td>
                                    <td><span class="category-chip ${escapeHtml(event.category)}">${escapeHtml(event.category)}</span></td>
                                    <td class="event-title">${escapeHtml(event.title)}</td>
                                    <td class="event-description">${escapeHtml(event.description || "")}</td>
                                </tr>
                            `,
                              )
                              .join("")}
                        </tbody>
                    </table>
                `;
          container.innerHTML = tableHTML;
          return;
        }

        // For specific category, group by category sections
        const categories = {};
        filteredEvents.forEach((event) => {
          if (!categories[event.category]) {
            categories[event.category] = [];
          }
          categories[event.category].push(event);
        });

        let html = "";

        // Render each category section
        Object.keys(categories)
          .sort()
          .forEach((category) => {
            html += `
                    <div class="category-section">
                        <div class="category-header">${category}</div>
                        <table class="timeline-table">
                            <thead>
                                <tr>
                                    <th>日付</th>
                                    <th>イベント名</th>
                                    <th>説明</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${categories[category]
                                  .map(
                                    (event) => `
                                    <tr>
                                        <td class="event-date">${formatDate(event.date, event.date_type)}</td>
                                        <td class="event-title">${escapeHtml(event.title)}</td>
                                        <td class="event-description">${escapeHtml(event.description || "")}</td>
                                    </tr>
                                `,
                                  )
                                  .join("")}
                            </tbody>
                        </table>
                    </div>
                `;
          });

        container.innerHTML = html;
      }

      // Format date
      function formatDate(dateString, dateType) {
        if (!dateString) return "";

        // If it's year-only (dateType is 'year' or date is in format 'YYYY-01-01')
        if (dateType === "year" || dateString.endsWith("-01-01")) {
          return dateString.substring(0, 4) + "年";
        }

        const date = new Date(dateString);
        return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
      }

      // Category filter
      document
        .getElementById("categoryFilter")
        .addEventListener("change", (e) => {
          selectedCategory = e.target.value;
          renderTimeline();
        });

      // Initialize
      loadEvents();
    </script>
  </body>
</html>
