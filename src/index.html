<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Open Graph -->
    <meta property="og:title" content="Shoei451 — 高校生・大学受験生向けの学習・入試対策ツール" />
    <meta property="og:description" content="世界史・政経・地理・古典など、普段の学習や大学入試対策に役立つオンラインクイズ・年表などの学習ツールを提供しています。" />

    <meta property="og:url" content="https://shoei451.netlify.app/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Shoei451 — 高校生・大学受験生向けの学習・入試対策ツール" />
    <meta name="twitter:description" content="世界史・政経・地理・古典など、普段の学習や大学入試対策に役立つオンラインクイズ・年表などの学習ツールを提供しています。" />
    <meta name="twitter:image" content="https://shoei451.netlify.app/images/favicon.png" />
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Shoei451",
      "url": "https://shoei451.netlify.app/"
    }
    </script>
    <link rel="icon" href="/images/favicon.ico" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#faba40" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Shoei451" />
    <link rel="icon" type="image/png" href="/images/favicon.png" />
    <link rel="apple-touch-icon" href="/images/favicon.png" />

    <!-- フラッシュ防止：テーマをCSSより前に適用 -->
    <script>
      (function () {
        const t = localStorage.getItem("pref-theme");
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <link rel="stylesheet" href="/css/index-cards.css" />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/utils.css" />
    <style>
      html.dark body {
        background-color: var(--color-bg);
        color: var(--color-text-primary);
      }

      /* ── Collapse (countdown) ── */
      .collapse {
        display: none;
      }
      .collapse.show {
        display: block;
      }

      /* ── Countdown Section ── */
      .countdown-section {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 8px;
        padding: 1.25rem 1.5rem;
        margin: 0 0 2.5rem;
      }

      .countdown-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        user-select: none;
      }

      .countdown-toggle__title {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--color-text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .countdown-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 0.75rem;
        margin-top: 1rem;
      }

      .countdown-item {
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: 6px;
        padding: 0.75rem 1rem;
      }

      .countdown-item__label {
        font-size: 0.75rem;
        color: var(--color-text-secondary);
        margin-bottom: 4px;
      }

      .countdown-item__days {
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--color-accent-text);
        font-feature-settings: "tnum";
      }

      body.dark .countdown-item__days {
        color: var(--color-accent);
      }

      .countdown-item__date {
        font-size: 0.75rem;
        color: var(--color-text-secondary);
        margin-top: 2px;
      }

      /* ── Hero ── */
      .site-hero {
        padding: 2.5rem 0 1.5rem;
        border-bottom: 1px solid var(--color-border);
        margin-bottom: 2rem;
      }

      .site-hero__eyebrow {
        font-size: 0.78rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--color-accent-text);
        margin-bottom: 0.5rem;
      }

      body.dark .site-hero__eyebrow {
        color: var(--color-accent);
      }

      .site-hero__title {
        font-size: clamp(1.6rem, 4vw, 2.2rem);
        font-weight: 700;
        margin-bottom: 0.5rem;
        line-height: 1.3;
      }

      .site-hero__desc {
        font-size: 0.95rem;
        color: var(--color-text-secondary);
        max-width: 560px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="nav-container"></div>

    <div class="container py-4">
      <!-- Hero -->
      <div class="site-hero">
        <p class="site-hero__eyebrow">@Shoei451</p>
        <h1 class="site-hero__title">My Learning Tools</h1>
        <p class="site-hero__desc">
          世界史・政経・地理・古典など、普段の学習+入試対策に役立つコンテンツ。内容は随時更新予定です。
        </p>
      </div>

      <!-- カウントダウン -->
      <div class="countdown-section">
        <div
          class="countdown-toggle"
          data-bs-toggle="collapse"
          data-bs-target="#countdownBody"
          aria-expanded="true"
          aria-controls="countdownBody"
        >
          <span class="countdown-toggle__title">
            <i class="bi bi-calendar3"></i> 入試カウントダウン
          </span>
          <span
            id="countdown-chevron"
            style="font-size: 0.85rem; color: var(--color-text-secondary)"
          ></span>
        </div>
        <div class="collapse show" id="countdownBody">
          <div class="countdown-grid" id="countdown-grid"></div>
        </div>
      </div>

      <!-- 歴史 -->
      <div class="index-section-header">
        <h2 class="index-section-header__title">歴史</h2>
        <span class="index-section-header__desc"
          >世界史・中国史の年代クイズ・年表</span
        >
      </div>
      <div class="index-card-grid" id="cards-history"></div>

      <!-- 政治・経済 -->
      <div class="index-section-header">
        <h2 class="index-section-header__title">政治・経済</h2>
        <span class="index-section-header__desc"
          >政経年代クイズ・憲法クイズ</span
        >
      </div>
      <div class="index-card-grid" id="cards-seikei"></div>

      <!-- 地理 -->
      <div class="index-section-header">
        <h2 class="index-section-header__title">地理</h2>
        <span class="index-section-header__desc">地図・首都クイズ</span>
      </div>
      <div class="index-card-grid" id="cards-geography"></div>

      <!-- その他 -->
      <div class="index-section-header">
        <h2 class="index-section-header__title">その他</h2>
        <span class="index-section-header__desc">英語・情報・古典など</span>
      </div>
      <div class="index-card-grid" id="cards-others"></div>
    </div>

    <footer id="site-footer"></footer>

    <script src="/js/icons.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/theme-toggle.js"></script>

    <script>
      if (document.documentElement.classList.contains("dark")) {
        document.body.classList.add("dark");
      }

      // ── アイコン ──────────────────────────────────────────
      window.setIcon("#countdown-chevron", "bi-chevron-up");

      // ── カウントダウン chevron 更新 ─────────────────────────
      document
        .getElementById("countdownBody")
        ?.addEventListener("hide.bs.collapse", () => {
          window.setIcon("#countdown-chevron", "bi-chevron-down");
        });
      document
        .getElementById("countdownBody")
        ?.addEventListener("show.bs.collapse", () => {
          window.setIcon("#countdown-chevron", "bi-chevron-up");
        });

      // ── カウントダウン描画 ──────────────────────────────────
      const EXAMS = [
        { label: "東京大学 二次試験", date: "2027-02-25" },
        { label: "共通テスト", date: "2027-01-17" },
      ];

      (function renderCountdown() {
        const grid = document.getElementById("countdown-grid");
        if (!grid) return;
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        grid.innerHTML = EXAMS.map((exam) => {
          const target = new Date(exam.date);
          const diff = Math.ceil((target - today) / 86400000);
          const label =
            diff > 0
              ? `あと ${diff} 日`
              : diff === 0
                ? "本日"
                : `${Math.abs(diff)} 日経過`;
          const dateStr = target.toLocaleDateString("ja-JP", {
            year: "numeric",
            month: "long",
            day: "numeric",
          });
          return `
            <div class="countdown-item">
              <div class="countdown-item__label">${exam.label}</div>
              <div class="countdown-item__days">${label}</div>
              <div class="countdown-item__date">${dateStr}</div>
            </div>`;
        }).join("");
      })();

      // ── カード描画 ─────────────────────────────────────────
      // sub-index-init.js の _cardHTML と同じパターン。
      // アイコン・タイトル・説明の構造を統一。
      function renderCards(sectionId, items) {
        const container = document.getElementById(sectionId);
        if (!container || !items?.length) return;

        container.innerHTML = items
          .map((item) => {
            const iconHtml = (() => {
              if (!item.icon) return "";
              if (/^bi-[\w-]+$/.test(item.icon)) {
                return `<i class="bi ${item.icon} index-card__bi-icon" aria-hidden="true"></i>`;
              }
              return `<img src="${item.icon}" class="index-card__icon" alt="" loading="lazy">`;
            })();
            const target = item.target
              ? `target="${item.target}" rel="noopener"`
              : "";
            return `
            <a href="${item.link}" ${target} class="index-card">
              ${iconHtml}
              <span class="index-card__title">${item.title}</span>
              ${item.description ? `<p class="index-card__desc">${item.description}</p>` : ""}
            </a>`;
          })
          .join("");
      }

      function tryRenderAll() {
        if (typeof CARDS_DATA === "undefined") return;
        renderCards("cards-history", CARDS_DATA.history);
        renderCards("cards-seikei", CARDS_DATA.seikei);
        renderCards("cards-geography", CARDS_DATA.geography);
        renderCards("cards-others", CARDS_DATA.miscellaneous);
      }

      tryRenderAll();
      window.addEventListener("load", tryRenderAll);
      document.addEventListener("cards-data-ready", tryRenderAll);
      window.tryRenderAll = tryRenderAll;
    </script>

    <script
      src="/js/lists-loader.js"
      onerror="console.info('lists-loader.js not found')"
    ></script>
    <script>
      tryRenderAll();
    </script>
  </body>
</html>
