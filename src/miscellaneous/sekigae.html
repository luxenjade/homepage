<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>席替えシャッフル</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  background: #f8f8f6;
  color: #111;
}

/* ── layout shell ── */
#app {
  height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: 16px 20px 12px;
}

/* ── header ── */
#header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  flex-shrink: 0;
}
#header h1 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.3px;
}
#header svg { width: 20px; height: 20px; color: #444; }

/* ── tabs ── */
#tabs {
  display: flex;
  border-bottom: 1px solid #e5e5e5;
  margin-bottom: 12px;
  flex-shrink: 0;
}
.tab-btn {
  padding: 7px 18px;
  font-size: 13px;
  font-weight: 500;
  color: #999;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
  font-family: inherit;
  transition: color .15s;
}
.tab-btn:hover { color: #555; }
.tab-btn.active { color: #111; border-bottom-color: #111; }
.tab-num { font-size: 10px; color: #ccc; margin-right: 4px; }
.tab-btn.active .tab-num { color: #bbb; }

/* ── sections ── */
.section { display: none; flex: 1; flex-direction: column; min-height: 0; }
.section.active { display: flex; }

/* ── toolbar ── */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
  flex-shrink: 0;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  font-size: 12px;
  font-family: inherit;
  border: 1px solid #ddd;
  border-radius: 8px;
  background: #fff;
  color: #333;
  cursor: pointer;
  transition: background .1s;
  white-space: nowrap;
}
.btn:hover { background: #f3f3f0; }
.btn svg { width: 13px; height: 13px; }
.btn-danger { border-color: #fca5a5; color: #b91c1c; }
.btn-danger:hover { background: #fef2f2; }
.btn-primary { background: #111; color: #fff; border-color: #111; }
.btn-primary:hover { background: #333; }
.btn-primary:disabled { background: #bbb; border-color: #bbb; cursor: not-allowed; }

.num-group {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  background: #fff;
  font-size: 12px;
  color: #888;
}
.num-group input {
  width: 36px;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  border: none;
  outline: none;
  background: transparent;
  color: #111;
  font-family: inherit;
}
.sep { color: #e5e5e5; font-size: 14px; }
.ml-auto { margin-left: auto; }
.badge { font-size: 11px; color: #999; }

/* ── hint ── */
.hint {
  font-size: 11px;
  color: #aaa;
  margin-bottom: 6px;
  flex-shrink: 0;
}

/* ── blackboard ── */
.bboard {
  background: #2d5016;
  color: #c8e6a0;
  text-align: center;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .08em;
  padding: 6px;
  border-radius: 6px;
  margin-bottom: 6px;
  flex-shrink: 0;
}

/* ── grid wrapper ── */
.grid-wrap {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

/* ── seat grid ── */
#seat-grid, #result-grid {
  flex: 1;
  min-height: 0;
  display: grid;
  /* columns set by JS */
  align-content: stretch;
}

.cell {
  border-radius: 6px;
  border: 1px solid #ddd;
  background: #fff;
  cursor: pointer;
  transition: border-color .1s, background .1s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cell:hover { border-color: #93c5fd; background: #eff6ff; }
.cell.empty {
  background: transparent;
  border: 1px dashed #e0e0e0;
}
.cell.empty:hover { background: #f8f8f6; border-color: #ccc; }
.cell.empty svg { opacity: .25; width: 30%; height: 30%; }

/* ── result cells ── */
.rcell {
  border-radius: 6px;
  border: 1px solid #e5e5e5;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, border-color .15s;
}
.rcell.settled {
  background: #f0fdf4;
  border-color: #86efac;
}
.rcell.empty-r {
  visibility: hidden;
}
.rcell .rval {
  font-weight: 700;
  line-height: 1;
  color: #d1d5db;
}
.rcell.settled .rval { color: #166534; }

/* ── shuffle tab controls ── */
.ctrl-bar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
  background: #fff;
  border: 1px solid #e8e8e4;
  border-radius: 12px;
  padding: 10px 16px;
  margin-bottom: 10px;
  flex-shrink: 0;
}
.ctrl-bar label { font-size: 13px; color: #555; font-weight: 500; }
.ctrl-bar input {
  width: 60px;
  text-align: center;
  font-size: 20px;
  font-weight: 700;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  padding: 2px 6px;
  background: #f8f8f6;
  color: #111;
  font-family: inherit;
  outline: none;
}
.ctrl-bar input:focus { border-color: #93c5fd; }
.ctrl-bar .unit { font-size: 12px; color: #aaa; }
#seat-warn { font-size: 11px; color: #ef4444; font-weight: 500; }
#shuffle-status { font-size: 12px; color: #888; }

/* confetti */
#confetti-canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 999;
}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<div id="app">

  <!-- Header -->
  <div id="header">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="10" width="7" height="7" rx="1.5"/>
      <rect x="14" y="10" width="7" height="7" rx="1.5"/>
      <rect x="8.5" y="3" width="7" height="7" rx="1.5"/>
      <path d="M6.5 10V8M17.5 10V8M12 10V8" stroke-width="1.3"/>
    </svg>
    <h1>席替えシャッフル</h1>
  </div>

  <!-- Tabs -->
  <div id="tabs">
    <button class="tab-btn active" id="tab-0" onclick="switchTab(0)">
      <span class="tab-num">01</span>座席レイアウト
    </button>
    <button class="tab-btn" id="tab-1" onclick="switchTab(1)">
      <span class="tab-num">02</span>シャッフル
    </button>
  </div>

  <!-- Section 0: Layout -->
  <div class="section active" id="section-0">
    <div class="toolbar">
      <div class="num-group">
        <span>列</span>
        <input type="number" id="cols-input" value="6" min="1" max="12">
        <span class="sep">|</span>
        <span>行</span>
        <input type="number" id="rows-input" value="7" min="1" max="10">
      </div>
      <button class="btn" onclick="resizeGrid()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2H3v16h5v4l4-4h5l4-4V2z"/></svg>
        グリッド更新
      </button>
      <button class="btn" onclick="fillAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg>
        全選択
      </button>
      <button class="btn btn-danger" onclick="clearAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
        全消去
      </button>
      <div class="ml-auto" style="display:flex;align-items:center;gap:10px">
        <span class="badge" id="seat-count-badge">席数: 0</span>
        <button class="btn btn-primary" onclick="switchTab(1)">
          次へ
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>
    <p class="hint">クリックで席のオン/オフを切り替え。黒板側（上）が前列です。</p>
    <div class="grid-wrap">
      <div class="bboard" id="layout-bboard">黒板（前）</div>
      <div id="seat-grid"></div>
    </div>
  </div>

  <!-- Section 1: Shuffle -->
  <div class="section" id="section-1">
    <div class="ctrl-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.87"/></svg>
      <label>出席者数</label>
      <input type="number" id="student-count" value="35" min="1" max="50">
      <span class="unit">名</span>
      <span id="seat-warn"></span>
      <div class="ml-auto" style="display:flex;align-items:center;gap:12px">
        <span id="shuffle-status"></span>
        <button class="btn btn-primary" id="shuffle-btn" onclick="startShuffle()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
          シャッフル開始
        </button>
      </div>
    </div>
    <div class="grid-wrap">
      <div class="bboard" id="result-bboard">黒板（前）</div>
      <div id="result-grid"></div>
    </div>
  </div>

</div><!-- #app -->

<script>
let COLS = 6, ROWS = 7;
let seats = [];
let assignment = {};
let isSpinning = false;
let spinTimer = null;

function seatList() {
  return seats.filter(s => s.on).sort((a, b) => a.r - b.r || a.c - b.c);
}

function initGrid() {
  seats = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      seats.push({ r, c, on: true });
  renderGrid();
}

/* Compute per-row height so ROWS rows fill the grid container exactly */
function rowHeight(gridEl) {
  const gap = 5;
  const h = gridEl.clientHeight;
  return Math.max(20, (h - (ROWS - 1) * gap) / ROWS);
}

function renderGrid() {
  const grid = document.getElementById('seat-grid');
  const rh = rowHeight(grid);
  grid.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
  grid.style.gridTemplateRows = `repeat(${ROWS}, ${rh}px)`;
  grid.style.gap = '5px';
  grid.innerHTML = '';

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const s = seats.find(x => x.r === r && x.c === c);
      const div = document.createElement('div');
      if (!s) {
        div.className = 'cell empty';
        div.title = 'クリックで席を追加';
        div.innerHTML = plusSVG();
        div.onclick = (() => { const rr = r, cc = c; return () => { seats.push({ r: rr, c: cc, on: true }); seats.sort((a, b) => a.r - b.r || a.c - b.c); renderGrid(); }; })();
      } else if (s.on) {
        div.className = 'cell';
        div.title = 'クリックで席を削除';
        div.onclick = ((_s) => () => { _s.on = false; renderGrid(); })(s);
      } else {
        div.className = 'cell empty';
        div.title = 'クリックで席を追加';
        div.innerHTML = plusSVG();
        div.onclick = ((_s) => () => { _s.on = true; renderGrid(); })(s);
      }
      grid.appendChild(div);
    }
  }

  document.getElementById('seat-count-badge').textContent = '席数: ' + seatList().length;
  updateSeatWarn();
}

function plusSVG() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:30%;height:30%"><path d="M12 5v14M5 12h14"/></svg>`;
}

function resizeGrid() {
  const nc = Math.max(1, Math.min(12, parseInt(document.getElementById('cols-input').value) || 6));
  const nr = Math.max(1, Math.min(10, parseInt(document.getElementById('rows-input').value) || 7));
  COLS = nc; ROWS = nr;
  const existing = seats.filter(s => s.r < ROWS && s.c < COLS);
  seats = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const ex = existing.find(x => x.r === r && x.c === c);
      seats.push({ r, c, on: ex ? ex.on : false });
    }
  renderGrid();
}

function clearAll() { seats.forEach(s => s.on = false); renderGrid(); }
function fillAll() { seats.forEach(s => s.on = true); renderGrid(); }

function updateSeatWarn() {
  const sc = parseInt(document.getElementById('student-count').value) || 0;
  const sl = seatList();
  const el = document.getElementById('seat-warn');
  if (!el) return;
  if (sc > sl.length) el.textContent = `席数(${sl.length})より多いです`;
  else if (sc < sl.length) el.textContent = `空席 ${sl.length - sc} 席`;
  else el.textContent = '';
}

function renderResultGrid(withSpinner) {
  const grid = document.getElementById('result-grid');
  if (!grid) return;
  const sc = parseInt(document.getElementById('student-count').value) || 0;
  const rh = rowHeight(grid);
  grid.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
  grid.style.gridTemplateRows = `repeat(${ROWS}, ${rh}px)`;
  grid.style.gap = '5px';
  grid.innerHTML = '';

  const sl = seatList();
  const fs = Math.max(11, Math.min(28, Math.floor(rh * 0.45)));

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const s = sl.find(x => x.r === r && x.c === c);
      const div = document.createElement('div');
      if (!s) {
        div.className = 'rcell empty-r';
      } else {
        const val = assignment[r + '_' + c];
        const settled = val != null && !withSpinner;
        div.className = 'rcell' + (settled ? ' settled' : '');
        div.dataset.key = r + '_' + c;
        const vEl = document.createElement('div');
        vEl.className = 'rval';
        vEl.style.fontSize = fs + 'px';
        vEl.textContent = val != null ? val : '—';
        div.appendChild(vEl);
      }
      grid.appendChild(div);
    }
  }
}

function startShuffle() {
  if (isSpinning) return;
  const sc = parseInt(document.getElementById('student-count').value) || 0;
  const sl = seatList();
  if (sl.length === 0) { document.getElementById('shuffle-status').textContent = '座席が登録されていません'; return; }
  if (sc < 1) { document.getElementById('shuffle-status').textContent = '出席者数を入力してください'; return; }

  const useCount = Math.min(sc, sl.length);
  const nums = []; for (let i = 1; i <= sc; i++) nums.push(i);
  for (let i = nums.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [nums[i], nums[j]] = [nums[j], nums[i]]; }
  const finalAssign = {};
  sl.forEach((s, i) => { finalAssign[s.r + '_' + s.c] = i < useCount ? nums[i] : null; });

  isSpinning = true;
  assignment = {};
  document.getElementById('shuffle-btn').disabled = true;
  document.getElementById('shuffle-status').textContent = 'シャッフル中...';
  renderResultGrid(true);

  const totalDuration = 3200, startInt = 45, endInt = 380;
  let elapsed = 0;
  function getInt(t) { const p = Math.min(t / totalDuration, 1); return Math.round(startInt + (endInt - startInt) * p * p); }

  function tick() {
    document.querySelectorAll('.rcell[data-key]').forEach(cell => {
      const vEl = cell.querySelector('.rval');
      if (vEl) vEl.textContent = Math.ceil(Math.random() * sc);
    });
    const interval = getInt(elapsed);
    elapsed += interval;
    if (elapsed >= totalDuration) {
      Object.assign(assignment, finalAssign);
      isSpinning = false;
      document.getElementById('shuffle-btn').disabled = false;
      renderResultGrid(false);
      document.getElementById('shuffle-status').textContent = useCount + '名の席が決まりました';
      launchConfetti();
      return;
    }
    spinTimer = setTimeout(tick, interval);
  }
  tick();
}

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = ['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899'];
  const pieces = Array.from({ length: 200 }, () => ({
    x: Math.random() * canvas.width, y: -10 - Math.random() * 300,
    w: 5 + Math.random() * 8, h: 8 + Math.random() * 10,
    color: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 5, vy: 1.5 + Math.random() * 4,
    rot: Math.random() * 360, vrot: (Math.random() - 0.5) * 10, opacity: 1
  }));
  const start = performance.now(), duration = 4000;
  (function draw(now) {
    const t = now - start, p = t / duration;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(q => {
      q.x += q.vx; q.y += q.vy; q.vy += 0.06; q.rot += q.vrot;
      if (p > 0.55) q.opacity = Math.max(0, 1 - (p - 0.55) / 0.45);
      if (q.y < canvas.height + 20) alive = true;
      ctx.save(); ctx.globalAlpha = q.opacity;
      ctx.translate(q.x, q.y); ctx.rotate(q.rot * Math.PI / 180);
      ctx.fillStyle = q.color; ctx.fillRect(-q.w / 2, -q.h / 2, q.w, q.h);
      ctx.restore();
    });
    if (t < duration && alive) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  })(start);
}

function switchTab(i) {
  [0, 1].forEach(ti => {
    document.getElementById('tab-' + ti).classList.toggle('active', ti === i);
    const sec = document.getElementById('section-' + ti);
    sec.classList.toggle('active', ti === i);
  });
  if (i === 1) { updateSeatWarn(); renderResultGrid(false); }
  if (i === 0) { renderGrid(); }
}

window.addEventListener('resize', () => {
  const active = document.querySelector('.section.active');
  if (!active) return;
  if (active.id === 'section-0') renderGrid();
  else renderResultGrid(false);
});

document.getElementById('student-count').addEventListener('input', updateSeatWarn);

initGrid();
</script>
</body>
</html>
